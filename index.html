      { type: 'arabic', text: 'وَ قِيْلَ الْيَوْمَ نَنْسٰىكُمْ كَمَا نَسِيْتُمْ لِقَآءَ يَوْمِكُمْ هٰذَا وَ مَاْوٰىكُمُ النَّارُ وَ مَا لَكُمْ مِّنْ نّٰصِرِيْنَ' },
      { type: 'text', text: '34] And it will be said, “This day We shall forsake you, the way you had forgotten the confronting of this day of yours - and your destination is the fire, and you do not have any supporters.”' },
      { type: 'arabic', text: 'ذٰلِكُمْ بِاَنَّكُمُ اتَّخَذْتُمْ اٰيٰتِ اللّٰهِ هُزُوًا وَّ غَرَّتْكُمُ الْحَيٰوةُ الدُّنْيَاۚ فَالْيَوْمَ لَا يُخْرَجُوْنَ مِنْهَا وَ لَا هُمْ يُسْتَعْتَبُوْنَ' },
      { type: 'text', text: '35] “This is because you mocked at the signs of Allah, and the worldly life deceived you”; so this day they are not to be removed from the fire, nor will anyone seek amends from them.' },
      { type: 'arabic', text: 'فَلِلّٰهِ الْحَمْدُ رَبِّ السَّمٰوٰتِ وَ رَبِّ الْاَرْضِ رَبِّ الْعٰلَمِيْنَ' },
      { type: 'text', text: '36] So all praise is for Allah only, the Lord of the heavens and the Lord of the earth, the Lord of the Creation!' },
      { type: 'arabic', text: 'وَ لَهُ الْكِبْرِيَآءُ فِی السَّمٰوٰتِ وَ الْاَرْضِؕ وَ هُوَ الْعَزِيْزُ الْحَكِيْمُ' },
   { type: 'text', text: '37] And for Him only is the Greatness, in the heavens and in the earth; and He only is the Most Honourable, the Wise.' }
            ]
        },

        {
            id: 46, name: "AL AHQAF", ar: "الأحقاف", juz: 26,
            audio: 'https://server10.mp3quran.net/minsh/046.mp3',
            content: [
                { type: 'section-title', text: 'AL AHQAF (THE SAND DUNES)' },
                { type: 'text', text: '(Revealed at Mecca - 35 verses)' },
                { type: 'arabic', text: 'بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ' },
                 { type: 'text', text: 'Allah - beginning with the name of - the Most Gracious, the Most Merciful' },
      { type: 'arabic', text: 'حـمۤ' },
      { type: 'text', text: '1] Ha-Meem. (Alphabets of the Arabic language - Allah, and to whomever He reveals, know their precise meanings.)' },
      { type: 'arabic', text: 'تَنْزِيْلُ الْكِتٰبِ مِنَ اللّٰهِ الْعَزِيْزِ الْحَكِيْمِؕ' },
      { type: 'text', text: '2] The sending down of this Book is from Allah the Most Honourable, the Wise.' },
      { type: 'arabic', text: 'مَا خَلَقْنَا السَّمٰوٰتِ وَ الْاَرْضَ وَ مَا بَيْنَهُمَاۤ اِلَّا بِالْحَقِّ وَ اَجَلٍ مُّسَمًّى ؕ وَ الَّذِيْنَ كَفَرُوْا عَمَّاۤ اُنْذِرُوْا مُعْرِضُوْنَ' },
      { type: 'text', text: '3] We did not create the heavens and the earth and all that is between them except with the truth, and for a fixed term; and the disbelievers have turned away from what they are warned!' },
      { type: 'arabic', text: 'قُلْ اَرَاَيْتُمْ مَّا تَدْعُوْنَ مِنْ دُوْنِ اللّٰهِ اَرُوْنِيْ مَاذَا خَلَقُوْا مِنَ الْاَرْضِ اَمْ لَهُمْ شِرْكٌ فِي السَّمٰوٰتِ ۚ ائْتُوْنِيْ بِكِتٰبٍ مِّنْ قَبْلِ هٰذَاۤ اَوْ اَثٰرَةٍ مِّنْ عِلْمٍ اِنْ كُنْتُمْ صٰدِقِيْنَ' },
      { type: 'text', text: '4] Proclaim, (O dear Prophet Mohammed - peace and blessings be upon him), “What is your opinion - regarding those whom you worship other than Allah - show me which part of the earth they have created, or do they own any portion of the heavens? Bring to me a Book preceding this (Qur’an), or some remnants of knowledge, if you are truthful.”' },
      { type: 'arabic', text: 'وَ مَنْ اَضَلُّ مِمَّنْ يَّدْعُوْا مِنْ دُوْنِ اللّٰهِ مَنْ لَّا يَسْتَجِيْبُ لَهٗۤ اِلٰی يَوْمِ الْقِيٰمَةِ وَ هُمْ عَنْ دُعَآئِهِمْ غٰفِلُوْنَ' },
      { type: 'text', text: '5] And who is more astray than one who worships those, instead of Allah, who cannot listen to their prayer until* the Day of Resurrection, and who do not even know of their worship! (Will never listen.)' },
      { type: 'arabic', text: 'وَ اِذَا حُشِرَ النَّاسُ كَانُوْا لَهُمْ اَعْدَآءً وَّ كَانُوْا بِعِبَادَتِهِمْ كٰفِرِيْنَ' },
      { type: 'text', text: '6] And on the day when people are gathered, they will become their enemies, and will reject their worshippers. (The idols will give testimony against the polytheists.)' },
      { type: 'arabic', text: 'وَ اِذَا تُتْلٰی عَلَيْهِمْ اٰيٰتُنَا بَيِّنٰتٍ قَالَ الَّذِيْنَ كَفَرُوْا لِلْحَقِّ لَمَّا جَآءَهُمْ ۙ هٰذَا سِحْرٌ مُّبِيْنٌؕ' },
      { type: 'text', text: '7] And when Our clear verses are recited to them, the disbelievers say regarding the Truth that has come to them, “This is an obvious magic!”' },
      { type: 'arabic', text: 'اَمْ يَقُوْلُوْنَ افْتَرٰىهُ ؕ قُلْ اِنِ افْتَرَيْتُهٗ فَلَا تَمْلِكُوْنَ لِيْ مِنَ اللّٰهِ شَيْئًا ؕ هُوَ اَعْلَمُ بِمَا تُفِيْضُوْنَ فِيْهِ ؕ كَفٰی بِهٖ شَهِيْدًۢا بَيْنِيْ وَ بَيْنَكُمْ ؕ وَ هُوَ الْغَفُوْرُ الرَّحِيْمُ' },
      { type: 'text', text: '8] What! They dare say, “He has fabricated it”? Say (O dear Prophet Mohammed - peace and blessings be upon him), “If I have fabricated it, then (I know that) you have no power to support me against Allah; He well knows the matters you are involved in; He is Sufficient as a Witness between me and you; and He only is the Oft Forgiving, the Most Merciful.”' },
      { type: 'arabic', text: 'قُلْ مَا كُنْتُ بِدْعًا مِّنَ الرُّسُلِ وَ مَاۤ اَدْرِيْ مَا يُفْعَلُ بِيْ وَ لَا بِكُمْ ؕ اِنْ اَتَّبِعُ اِلَّا مَا يُوحٰۤى اِلَيَّ وَ مَاۤ اَنَا اِلَّا نَذِيْرٌ مُّبِيْنٌ' },
      { type: 'text', text: '9] Say, “I am not something new* among the Noble Messengers, nor do I know (on my own) what will happen to me** or with you; I only follow that which is divinely revealed to me, and I am purely a Herald of clear warning. (* I am like the earlier ones. ** My knowledge comes due to divine revelations.)' },
      { type: 'arabic', text: 'قُلْ اَرَاَيْتُمْ اِنْ كَانَ مِنْ عِنْدِ اللّٰهِ وَ كَفَرْتُمْ بِهٖ وَ شَهِدَ شَاهِدٌ مِّنْۢ بَنِيْۤ اِسْرَآءِيْلَ عَلٰی مِثْلِهٖ فَاٰمَنَ وَ اسْتَكْبَرْتُمْ ؕ اِنَّ اللّٰهَ لَا يَهْدِي الْقَوْمَ الظّٰلِمِيْنَ' },
      { type: 'text', text: '10] Say, “What is your opinion - if the Qur’an is from Allah and you have rejected faith in it, and a witness among the Descendants of Israel has already testified upon this and accepted faith, while you became arrogant? Indeed Allah does not guide the unjust.”' },
      { type: 'arabic', text: 'وَ قَالَ الَّذِيْنَ كَفَرُوْا لِلَّذِيْنَ اٰمَنُوْا لَوْ كَانَ خَيْرًا مَّا سَبَقُوْنَاۤ اِلَيْهِ ؕ وَ اِذْ لَمْ يَهْتَدُوْا بِهٖ فَسَيَقُوْلُوْنَ هٰذَاۤ اِفْكٌ قَدِيْمٌ' },
      { type: 'text', text: '11] And the disbelievers said regarding the Muslims, “If there were any good in it, the Muslims would not have surpassed us in achieving it!”; and since they did not receive guidance with it, they will now say, “This is an old slander.”' },
      { type: 'arabic', text: 'وَ مِنْ قَبْلِهٖ كِتٰبُ مُوْسٰۤى اِمَامًا وَّ رَحْمَةً ؕ وَ هٰذَا كِتٰبٌ مُّصَدِّقٌ لِّسَانًا عَرَبِيًّا لِّيُنْذِرَ الَّذِيْنَ ظَلَمُوْا ۖ وَ بُشْرٰی لِلْمُحْسِنِيْنَؕ' },
      { type: 'text', text: '12] And whereas before this exists the Book of Moosa, a guide and a mercy; and this is a Book giving testimony, in the Arabic language, to warn the unjust; and to give glad tidings to the virtuous.' },
      { type: 'arabic', text: 'اِنَّ الَّذِيْنَ قَالُوْا رَبُّنَا اللّٰهُ ثُمَّ اسْتَقَامُوْا فَلَا خَوْفٌ عَلَيْهِمْ وَ لَا هُمْ يَحْزَنُوْنَۚ' },
      { type: 'text', text: '13] Indeed those who said, “Allah is our Lord”, and then remained steadfast - upon them is neither any fear nor shall they grieve.' },
      { type: 'arabic', text: 'اُولٰٓئِكَ اَصْحٰبُ الْجَنَّةِ خٰلِدِيْنَ فِيْهَا ۚ جَزَآءًۢ بِمَا كَانُوْا يَعْمَلُوْنَ' },
      { type: 'text', text: '14] They are the People of Paradise, abiding in it forever; the reward of their deeds.' },
      { type: 'arabic', text: 'وَ وَصَّيْنَا الْاِنْسَانَ بِوَالِدَيْهِ اِحْسَانًا ؕ حَمَلَتْهُ اُمُّهٗ كُرْهًا وَّ وَضَعَتْهُ كُرْهًا ؕ وَ حَمْلُهٗ وَ فِصٰلُهٗ ثَلٰثُوْنَ شَهْرًا ؕ حَتّٰۤى اِذَا بَلَغَ اَشُدَّهٗ وَ بَلَغَ اَرْبَعِيْنَ سَنَةً ۙ قَالَ رَبِّ اَوْزِعْنِيْۤ اَنْ اَشْكُرَ نِعْمَتَكَ الَّتِيْۤ اَنْعَمْتَ عَلَيَّ وَ عَلٰی وَالِدَيَّ وَ اَنْ اَعْمَلَ صَالِحًا تَرْضٰىهُ وَ اَصْلِحْ لِيْ فِيْ ذُرِّيَّتِيْ ۪ اِنِّيْ تُبْتُ اِلَيْكَ وَ اِنِّيْ مِنَ الْمُسْلِمِيْنَ' },
      { type: 'text', text: '15] And We have commanded man to be good towards parents; his mother bore him with hardship, and delivered him with hardship; and carrying him and weaning him is for thirty months; until when he * reached maturity and became forty years of age, he said, “My Lord! Inspire me to be thankful for the favours you bestowed upon me and my parents, and that I may perform the deeds pleasing to You, and keep merit among my offspring; I have inclined towards you and I am a Muslim.” (* This verse was revealed concerning S. Abu Bakr - the first caliph, R. A. A)' },
      { type: 'arabic', text: 'اُولٰٓئِكَ الَّذِيْنَ نَتَقَبَّلُ عَنْهُمْ اَحْسَنَ مَا عَمِلُوْا وَ نَتَجَاوَزُ عَنْ سَيِّاٰتِهِمْ فِيْۤ اَصْحٰبُ الْجَنَّةِ ؕ وَعْدَ الصِّدْقِ الَّذِيْ كَانُوْا يُوْعَدُوْنَ' },
      { type: 'text', text: '16] These are the ones whose good deeds We will accept, and overlook their shortfalls - among the People of Paradise; a true promise which is being given to them.' },
      { type: 'arabic', text: 'وَ الَّذِيْ قَالَ لِوَالِدَيْهِ اُفٍّ لَّكُمَاۤ اَتَعِدٰنِنِيْۤ اَنْ اُخْرَجَ وَ قَدْ خَلَتِ الْقُرُوْنُ مِنْ قَبْلِيْ ۚ وَ هُمَا يَسْتَغِيْثَانِ اللّٰهَ وَيْلَكَ اٰمِنْ ۖ اِنَّ وَعْدَ اللّٰهِ حَقٌّ ۚ فَيَقُوْلُ مَا هٰذَاۤ اِلَّاۤ اَسَاطِيْرُ الْاَوَّلِيْنَ' },
      { type: 'text', text: '17] And the one who said to his parents, “Uff - I am fed up with both of you! What! You promise me that I will be raised again whereas generations have passed away before me?” And they both seek Allah’s help and say to him, “May you be ruined, accept faith! Indeed Allah’s promise is true”; he therefore answers, “This is nothing except stories of former people.”' },
      { type: 'arabic', text: 'اُولٰٓئِكَ الَّذِيْنَ حَقَّ عَلَيْهِمُ الْقَوْلُ فِيْۤ اُمَمٍ قَدْ خَلَتْ مِنْ قَبْلِهِمْ مِّنَ الْجِنِّ وَ الْاِنْسِ ؕ اِنَّهُمْ كَانُوْا خٰسِرِيْنَ' },
      { type: 'text', text: '18] It is these upon whom the Word has proved true, among the nations that passed away before them, of jinns and men; indeed they were losers.' },
      { type: 'arabic', text: 'وَ لِكُلٍّ دَرَجٰتٌ مِّمَّا عَمِلُوْا ۚ وَ لِيُوَفِّيَهُمْ اَعْمَالَهُمْ وَ هُمْ لَا يُظْلَمُوْنَ' },
      { type: 'text', text: '19] And for all persons are ranks according to their deeds; and so that He may repay them in full for their deeds, and they will not be wronged.' },
      { type: 'arabic', text: 'وَ يَوْمَ يُعْرَضُ الَّذِيْنَ كَفَرُوْا عَلَى النَّارِ ؕ اَذْهَبْتُمْ طَيِّبٰتِكُمْ فِيْ حَيَاتِكُمُ الدُّنْيَا وَ اسْتَمْتَعْتُمْ بِهَا ۚ فَالْيَوْمَ تُجْزَوْنَ عَذَابَ الْهُوْنِ بِمَا كُنْتُمْ تَسْتَكْبِرُوْنَ فِي الْاَرْضِ بِغَيْرِ الْحَقِّ وَ بِمَا كُنْتُمْ تَفْسُقُوْنَ' },
      { type: 'text', text: '20] And on the day when the disbelievers will be presented upon the fire; it will be said to them, “You have wasted your portion of the good things in the life of this world and enjoyed them; so this day you will be repaid with the disgraceful punishment, the recompense of your wrongfully priding yourself in the land, and because you used to disobey.”' },
      { type: 'arabic', text: 'وَ اذْكُرْ اَخَا عَادٍ ؕ اِذْ اَنْذَرَ قَوْمَهٗ بِالْاَحْقَافِ وَ قَدْ خَلَتِ النُّذُرُ مِنْۢ بَيْنِ يَدَيْهِ وَ مِنْ خَلْفِهٖۤ اَلَّا تَعْبُدُوْا اِلَّا اللّٰهَ ؕ اِنِّيْۤ اَخَافُ عَلَيْكُمْ عَذَابَ يَوْمٍ عَظِيْمٍ' },
      { type: 'text', text: '21] And remember the fellowman of the tribe of A’ad; when he warned his nation in the Ahqaf * - and indeed Heralds of warning passed away before and after him - that, “Do not worship anyone except Allah; indeed I fear the punishment of a Great Day upon you. (* A country among sand dunes.)' },
      { type: 'arabic', text: 'قَالُوْۤا اَجِئْتَنَا لِتَاْفِكَنَا عَنْ اٰلِهَتِنَا ۚ فَاْتِنَا بِمَا تَعِدُنَاۤ اِنْ كُنْتُمْ صٰدِقِيْنَ' },
      { type: 'text', text: '22] They said, “Have you come to us in order to turn us away from our Gods? Therefore bring upon us what you promise us, if you are truthful.”' },
      { type: 'arabic', text: 'قَالَ اِنَّمَا الْعِلْمُ عِنْدَ اللّٰهِ ۖ وَ اُبَلِّغُكُمْ مَّاۤ اُرْسِلْتُ بِهٖ وَ لٰكِنِّيْۤ اَرٰىكُمْ قَوْمًا تَجْهَلُوْنَ' },
      { type: 'text', text: '23] He said, “Its knowledge is only with Allah; and I convey to you the messages of my Lord, but I perceive that you are an ignorant nation.”' },
      { type: 'arabic', text: 'فَلَمَّا رَاَوْهُ عَارِضًا مُّسْتَقْبِلَ اَوْدِيَتِهِمْ ۙ قَالُوْا هٰذَا عَارِضٌ مُّقْطِرُنَا ؕ بَلْ هُوَ مَا اسْتَعْجَلْتُمْ بِهٖ ؕ رِيْحٌ فِيْهَا عَذَابٌ اَلِيْمٌ' },
      { type: 'text', text: '24] So when they saw the punishment coming towards their valleys, spread like a cloud on the horizon, they said, “That is a cloud which will shower rain upon us”; said Hud “In fact this is what you were being impatient for; a windstorm carrying a painful punishment.”' },
      { type: 'arabic', text: 'تُدَمِّرُ كُلَّ شَيْءٍۢ بِاَمْرِ رَبِّهَا فَاَصْبَحُوْا لَا يُرٰۤى اِلَّا مَسٰكِنُهُمْ ؕ كَذٰلِكَ نَجْزِي الْقَوْمَ الْمُجْرِمِيْنَ' },
      { type: 'text', text: '25] “That destroys all things by the command of its Lord” - so at morning none could be seen except their empty houses; this is the sort of punishment We mete out to the guilty.' },
      { type: 'arabic', text: 'وَ لَقَدْ مَكَّنّٰهُمْ فِيْمَاۤ اِنْ مَّكَّنّٰكُمْ فِيْهِ وَ جَعَلْنَا لَهُمْ سَمْعًا وَّ اَبْصَارًا وَّ اَفْـِٕدَةً ۖ فَمَاۤ اَغْنٰی عَنْهُمْ سَمْعُهُمْ وَ لَاۤ اَبْصَارُهُمْ وَ لَاۤ اَفْـِٕدَتُهُمْ مِّنْ شَيْءٍ اِذْ كَانُوْا يَجْحَدُوْنَ بِاٰيٰتِ اللّٰهِ وَ حَاقَ بِهِمْ مَّا كَانُوْا بِهٖ يَسْتَهْزِءُوْنَ' },
      { type: 'text', text: '26] And We had indeed given them the means which We have not given you, and made ears and eyes and hearts for them; so their ears and eyes and hearts did not benefit them at all because they used to deny the signs of Allah, and the punishment they used to mock at encompassed them.' },
      { type: 'arabic', text: 'وَ لَقَدْ اَهْلَكْنَا مَا حَوْلَكُمْ مِّنَ الْقُرٰی وَ صَرَّفْنَا الْاٰيٰتِ لَعَلَّهُمْ يَرْجِعُوْنَ' },
      { type: 'text', text: '27] And We indeed destroyed townships surrounding you, and brought several signs so that they may desist.' },
      { type: 'arabic', text: 'فَلَوْ لَا نَصَرَهُمُ الَّذِيْنَ اتَّخَذُوْا مِنْ دُوْنِ اللّٰهِ قُرْبَانًا اٰلِهَةً ؕ بَلْ ضَلُّوْا عَنْهُمْ ۚ وَ ذٰلِكَ اِفْكُهُمْ وَ مَا كَانُوْا يَفْتَرُوْنَ' },
      { type: 'text', text: '28] So why did they - the ones whom they had chosen as Gods as a means of attaining Allah’s proximity - not help them? In fact the disbelievers lost them; and this is just their slander and fabrication.' },
      { type: 'arabic', text: 'وَ اِذْ صَرَفْنَاۤ اِلَيْكَ نَفَرًا مِّنَ الْجِنِّ يَسْتَمِعُوْنَ الْقُرْاٰنَ ۚ فَلَمَّا حَضَرُوْهُ قَالُوْۤا اَنْصِتُوْا ۚ فَلَمَّا قُضِيَ وَلَّوْا اِلٰی قَوْمِهِمْ مُّنْذِرِيْنَ' },
      { type: 'text', text: '29] And when We sent a number of jinns towards you (O dear Prophet Mohammed - peace and blessings be upon him), listening attentively to the Qur’an; so when they presented themselves there, they said to each other, “Listen quietly!”; and when the recitation finished, they turned back to their people, giving them warning.' },
      { type: 'arabic', text: 'قَالُوْا يٰقَوْمَنَاۤ اِنَّا سَمِعْنَا كِتٰبًا اُنْزِلَ مِنْۢ بَعْدِ مُوْسٰی مُصَدِّقًا لِّمَا بَيْنَ يَدَيْهِ يَهْدِيْ اِلَى الْحَقِّ وَ اِلٰی طَرِيْقٍ مُّسْتَقِيْمٍ' },
      { type: 'text', text: '30] They said, “O our people! We have indeed heard a Book, sent down after Moosa, which confirms the Books preceding it, and guides towards the Truth and the Straight Path.”' },
      { type: 'arabic', text: 'يٰقَوْمَنَاۤ اَجِيْبُوْا دَاعِيَ اللّٰهِ وَ اٰمِنُوْا بِهٖ يَغْفِرْ لَكُمْ مِّنْ ذُنُوْبِكُمْ وَ يُجِرْكُمْ مِّنْ عَذَابٍ اَلِيْمٍ' },
      { type: 'text', text: '31] “O our people! Listen to Allah’s caller and accept faith in Him, so that He may forgive you some of your sins and save you from the painful punishment.”' },
      { type: 'arabic', text: 'وَ مَنْ لَّا يُجِبْ دَاعِيَ اللّٰهِ فَلَيْسَ بِمُعْجِزٍ فِي الْاَرْضِ وَ لَيْسَ لَهٗ مِنْ دُوْنِهٖۤ اَوْلِيَآءُ ؕ اُولٰٓئِكَ فِيْ ضَلٰلٍ مُّبِيْنٍ' },
      { type: 'text', text: '32] “And whoever does not listen to Allah’s caller cannot escape in the earth, and he has no supporters against Allah; they are in open error.”' },
      { type: 'arabic', text: 'اَوَلَمْ يَرَوْا اَنَّ اللّٰهَ الَّذِيْ خَلَقَ السَّمٰوٰتِ وَ الْاَرْضَ وَ لَمْ يَعْيَ بِخَلْقِهِنَّ بِقٰدِرٍ عَلٰۤى اَنْ يُّحْيِيَ الْمَوْتٰی ؕ بَلٰۤى اِنَّهٗ عَلٰی كُلِّ شَيْءٍ قَدِيْرٌ' },
      { type: 'text', text: '33] Have they not realised that Allah, Who did not tire in creating the heavens and the earth and in creating them, is Able to revive the dead? Surely yes, why not? Indeed He is Able to do all things.' },
      { type: 'arabic', text: 'وَ يَوْمَ يُعْرَضُ الَّذِيْنَ كَفَرُوْا عَلَى النَّارِ ؕ اَلَيْسَ هٰذَا بِالْحَقِّ ؕ قَالُوْا بَلٰی وَ رَبِّنَا ؕ قَالَ فَذُوْقُوا الْعَذَابَ بِمَا كُنْتُمْ تَكْفُرُوْنَ' },
      { type: 'text', text: '34] And on the day when the disbelievers are presented upon the fire; it will be said, “Is this not a reality?” They will answer, “By oath of our Lord, surely yes, why not?”; it will be said, “Therefore taste the punishment, the recompense of your disbelief.”' },
      { type: 'arabic', text: 'فَاصْبِرْ كَمَا صَبَرَ اُولُوا الْعَزمِ مِنَ الرُّسُلِ وَ لَا تَسْتَعْجِلْ لَّهُمْ ؕ كَاَنَّهُمْ يَوْمَ يَرَوْنَ مَا يُوْعَدُوْنَ ۙ لَمْ يَلْبَثُوْۤا اِلَّا سَاعَةً مِّنْ نَّهَارٍ ؕ بَلٰغٌ ۚ فَهَلْ يُهْلَكُ اِلَّا الْقَوْمُ الْفٰسِقُوْنَ' },
      { type: 'text', text: '35] Therefore patiently endure (O dear Prophet Mohammed - peace and blessings be upon him) like the courageous Noble Messengers had endured, and do not be impatient for them; on the day when they see what they are promised, it will be as if they had not stayed on earth except part of a day; this is to be conveyed; will anyone be destroyed, except the disobedient?' }
            ]
        },

        {

 { type: 'text', text: 'Allah - beginning with the name of - the Most Gracious, the Most Merciful' },
      { type: 'arabic', text: 'اَلَّذِيْنَ كَفَرُوْا وَ صَدُّوْا عَنْ سَبِيْلِ اللّٰهِ اَضَلَّ اَعْمَالَهُمْ' },
      { type: 'text', text: '1] Allah has destroyed the deeds of those who disbelieved and prevented from Allah’s way.' },
      { type: 'arabic', text: 'وَ الَّذِيْنَ اٰمَنُوْا وَ عَمِلُوا الصّٰلِحٰتِ وَ اٰمَنُوْا بِمَا نُزِّلَ عَلٰی مُحَمَّدٍ وَّ هُوَ الْحَقُّ مِنْ رَّبِّهِمْ ۙ كَفَّرَ عَنْهُمْ سَيِّاٰتِهِمْ وَ اَصْلَحَ بَالَهُمْ' },
      { type: 'text', text: '2] And those who accepted faith and did good deeds and believed in what has been sent down upon Mohammed (peace and blessings be upon him) - and that is the truth from their Lord - Allah has relieved them of some of their evils and refined their condition.' },
      { type: 'arabic', text: 'ذٰلِكَ بِاَنَّ الَّذِيْنَ كَفَرُوا اتَّبَعُوا الْبَاطِلَ وَ اَنَّ الَّذِيْنَ اٰمَنُوا اتَّبَعُوا الْحَقَّ مِنْ رَّبِّهِمْ ؕ كَذٰلِكَ يَضْرِبُ اللّٰهُ لِلنَّاسِ اَمْثَالَهُمْ' },
      { type: 'text', text: '3] This is because the disbelievers followed falsehood and the believers followed the Truth which is from their Lord; this is how Allah illustrates the examples of people to them.' },
      { type: 'arabic', text: 'فَاِذَا لَقِيْتُمُ الَّذِيْنَ كَفَرُوْا فَضَرْبَ الرِّقَابِ ؕ حَتّٰۤى اِذَاۤ اَثْخَنْتُمُوْهُمْ فَشُدُّوا الْوَثَاقَ ۙ فَاِمَّا مَنَّۢا بَعْدُ وَ اِمَّا فِدَآءً حَتّٰی تَضَعَ الْحَرْبُ اَوْزَارَهَا ؕ۬ ذٰلِكَ ؕ وَ لَوْ يَشَآءُ اللّٰهُ لَانْتَصَرَ مِنْهُمْ وَ لٰكِنْ لِّيَبْلُوَ بَعْضَكُمْ بِبَعْضٍ ؕ وَ الَّذِيْنَ قُتِلُوْا فِيْ سَبِيْلِ اللّٰهِ فَلَنْ يُّضِلَّ اَعْمَالَهُمْ' },
      { type: 'text', text: '4] So when you confront the disbelievers, strike at their necks; until when you have slain them in plenty, tie them up firmly; then after that, you may either release them as a favour or take ransom, until the war lays down its ordeal; this is it; and had Allah willed He Himself could have taken revenge from them, but this is to test some of you with others; and Allah will surely never waste the deeds of those who were killed in His way.' },
      { type: 'arabic', text: 'سَيَهْدِيْهِمْ وَ يُصْلِحُ بَالَهُمْۚ' },
      { type: 'text', text: '5] He will soon guide them (towards Paradise) and make them succeed.' },
      { type: 'arabic', text: 'وَ يُدْخِلُهُمُ الْجَنَّةَ عَرَّفَهَا لَهُمْ' },
      { type: 'text', text: '6] And He will admit them into Paradise - they have been made familiar with it.' },
      { type: 'arabic', text: 'يٰۤاَيُّهَا الَّذِيْنَ اٰمَنُوْۤا اِنْ تَنْصُرُوا اللّٰهَ يَنْصُرْكُمْ وَ يُثَبِّتْ اَقْدَامَكُمْ' },
      { type: 'text', text: '7] O People who Believe! If you help the religion of Allah, He will help you and will stabilise you.' },
      { type: 'arabic', text: 'وَ الَّذِيْنَ كَفَرُوْا فَتَعْسًا لَّهُمْ وَ اَضَلَّ اَعْمَالَهُمْ' },
      { type: 'text', text: '8] And for those who disbelieve - may they be ruined, and may Allah destroy all their deeds!' },
      { type: 'arabic', text: 'ذٰلِكَ بِاَنَّهُمْ كَرِهُوْا مَاۤ اَنْزَلَ اللّٰهُ فَاَحْبَطَ اَعْمَالَهُمْ' },
      { type: 'text', text: '9] This is because they disliked what Allah has sent down - He has therefore squandered all their deeds.' },
      { type: 'arabic', text: 'اَفَلَمْ يَسِيْرُوْا فِي الْاَرْضِ فَيَنْظُرُوْا كَيْفَ كَانَ عَاقِبَةُ الَّذِيْنَ مِنْ قَبْلِهِمْ ؕ دَمَّرَ اللّٰهُ عَلَيْهِمْ ۫ وَ لِلْكٰفِرِيْنَ اَمْثَالُهَا' },
      { type: 'text', text: '10] So did they not travel in the land to see what sort of fate befell those who preceded them? Allah poured ruin upon them; and for the disbelievers are several like it.' },
      { type: 'arabic', text: 'ذٰلِكَ بِاَنَّ اللّٰهَ مَوْلَى الَّذِيْنَ اٰمَنُوْا وَ اَنَّ الْكٰفِرِيْنَ لَا مَوْلٰی لَهُمْ' },
      { type: 'text', text: '11] This is because Allah is the Supporter of the believers, whereas the disbelievers do not have any supporter.' },
      { type: 'arabic', text: 'اِنَّ اللّٰهَ يُدْخِلُ الَّذِيْنَ اٰمَنُوْا وَ عَمِلُوا الصّٰلِحٰتِ جَنّٰتٍ تَجْرِيْ مِنْ تَحْتِهَا الْاَنْهٰرُ ؕ وَ الَّذِيْنَ كَفَرُوْا يَتَمَتَّعُوْنَ وَ يَاْكُلُوْنَ كَمَا تَاْكُلُ الْاَنْعَامُ وَ النَّارُ مَثْوًى لَّهُمْ' },
      { type: 'text', text: '12] Allah will indeed admit those who believed and did good deeds into Gardens beneath which rivers flow; and the disbelievers enjoy, and they eat like the cattle eat, and their destination is in the fire.' },
      { type: 'arabic', text: 'وَ كَاَيِّنْ مِّنْ قَرْيَةٍ هِيَ اَشَدُّ قُوَّةً مِّنْ قَرْيَتِكَ الَّتِيْۤ اَخْرَجَتْكَ ۚ اَهْلَكْنٰهُمْ فَلَا نَاصِرَ لَهُمْ' },
      { type: 'text', text: '13] And many a township existed which was stronger than your town (O dear Prophet Mohammed - peace and blessings be upon him) - those who removed you from your town - We destroyed them, so they do not have a supporter!' },
      { type: 'arabic', text: 'اَفَمَنْ كَانَ عَلٰی بَيِّنَةٍ مِّنْ رَّبِّهٖ كَمَنْ زُيِّنَ لَهٗ سُوْۤءُ عَمَلِهٖ وَ اتَّبَعُوْۤا اَهْوَآءَهُمْ' },
      { type: 'text', text: '14] So will one who is upon on a clear proof from his Lord, ever be like any of those whose evil deeds are made to appear good to them and they follow their own desires?' },
      { type: 'arabic', text: 'مَثَلُ الْجَنَّةِ الَّتِيْ وُعِدَ الْمُتَّقُوْنَ ؕ فِيْهَاۤ اَنْهٰرٌ مِّنْ مَّآءٍ غَيْرِ اٰسِنٍ ۚ وَ اَنْهٰرٌ مِّنْ لَّبَنٍ لَّمْ يَتَغَيَّرْ طَعْمُهٗ ۚ وَ اَنْهٰرٌ مِّنْ خَمْرٍ لَّذَّةٍ لِّلشّٰرِبِيْنَ ۚ وَ اَنْهٰرٌ مِّنْ عَسَلٍ مُّصَفًّى ؕ وَ لَهُمْ فِيْهَا مِنْ كُلِّ الثَّمَرٰتِ وَ مَغْفِرَةٌ مِّنْ رَّبِّهِمْ ؕ كَمَنْ هُوَ خَالِدٌ فِي النَّارِ وَ سُقُوْا مَآءً حَمِيْمًا فَقَطَّعَ اَمْعَآءَهُمْ' },
      { type: 'text', text: '15] A description of the Garden which is promised to the pious; in it are rivers of water which shall never pollute; and rivers of milk the taste of which shall never change; and rivers of wine delicious to drink; and rivers of purified honey; and in it for them are fruits of all kinds, and the forgiveness of their Lord; so will such ever be equal to those who are to stay in the fire for ever and who will be given boiling water to drink so that it tears their guts apart?' },
      { type: 'arabic', text: 'وَ مِنْهُمْ مَّنْ يَّسْتَمِعُ اِلَيْكَ ۚ حَتّٰۤى اِذَا خَرَجُوْا مِنْ عِنْدِكَ قَالُوْا لِلَّذِيْنَ اُوْتُوا الْعِلْمَ مَاذَا قَالَ اٰنِفًا ؕ اُولٰٓئِكَ الَّذِيْنَ طَبَعُ اللّٰهَ عَلٰی قُلُوْبِهِمْ وَ اتَّبَعُوْۤا اَهْوَآءَهُمْ' },
      { type: 'text', text: '16] And among them are some who listen to what you say; until when they go away from you, they say to those who have been given knowledge, “What did he say now?”; they are those whose hearts Allah has sealed, and they follow their own desires.' },
      { type: 'arabic', text: 'وَ الَّذِيْنَ اهْتَدَوْا زَادَهُمْ هُدًى وَّ اٰتٰىهُمْ تَقْوٰىهُمْ' },
      { type: 'text', text: '17] And those who attained the right path - Allah increases the guidance for them and bestows their piety to them.' },
      { type: 'arabic', text: 'فَهَلْ يَنْظُرُوْنَ اِلَّا السَّاعَةَ اَنْ تَاْتِيَهُمْ بَغْتَةً ۚ فَقَدْ جَآءَ اَشْرَاطُهَا ۚ فَاَنّٰى لَهُمْ اِذَا جَآءَتْهُمْ ذِكْرٰىهُمْ' },
      { type: 'text', text: '18] So what are they waiting for, except that the Last Day suddenly come upon them? For its signs have already appeared; so when it does come, of what use is their realising it?' },
      { type: 'arabic', text: 'فَاعْلَمْ اَنَّهٗ لَاۤ اِلٰهَ اِلَّا اللّٰهُ وَ اسْتَغْفِرْ لِذَنْۢبِكَ وَ لِلْمُؤْمِنِيْنَ وَ الْمُؤْمِنٰتِ ؕ وَ اللّٰهُ يَعْلَمُ مُتَقَلَّبَكُمْ وَ مَثْوٰىكُمْ' },
      { type: 'text', text: '19] Therefore know (O dear Prophet Mohammed - peace and blessings be upon him) that there is none worthy of worship except Allah, and seek the forgiveness of sins of your close ones and for the common believing men and women; and Allah knows your movements during the day and your resting during the night.' },
      { type: 'arabic', text: 'وَ يَقُوْلُ الَّذِيْنَ اٰمَنُوْا لَوْ لَا نُزِّلَتْ سُوْرَةٌ ۚ فَاِذَاۤ اُنْزِلَتْ سُوْرَةٌ مُّحْكَمَةٌ وَّ ذُكِرَ فِيْهَا الْقِتَالُ ۙ رَاَيْتَ الَّذِيْنَ فِيْ قُلُوْبِهِمْ مَّرَضٌ يَّنْظُرُوْنَ اِلَيْكَ نَظَرَ الْمَغْشِيِّ عَلَيْهِ مِنَ الْمَوْتِ ؕ فَاَوْلٰی لَهُمْ' },
      { type: 'text', text: '20] And the Muslims say, “Why was not a chapter sent down?” So when a positive chapter was sent down, and war was commanded in it, you will see those in whose hearts is a disease looking at you with the dazed looks of a dying man; so it would be better for them. -' },
      { type: 'arabic', text: 'طَاعَةٌ وَّ قَوْلٌ مَّعْرُوْفٌ ۚ فَاِذَا عَزَمَ الْاَمْرُ ۠ فَلَوْ صَدَقُوا اللّٰهَ لَكَانَ خَيْرًا لَّهُمْ' },
      { type: 'text', text: '21] To obey and speak good; so when the manifest command came - it would have been better for them if they had remained faithful to Allah.' },
      { type: 'arabic', text: 'فَهَلْ عَسَيْتُمْ اِنْ تَوَلَّيْتُمْ اَنْ تُفْسِدُوْا فِي الْاَرْضِ وَ تُقَطِّعُوْۤا اَرْحَامَكُمْ' },
      { type: 'text', text: '22] So do you * portray that if you get governance, you would spread chaos in the land and sever your relations? (* The hypocrites)' },
      { type: 'arabic', text: 'اُولٰٓئِكَ الَّذِيْنَ لَعَنَهُمُ اللّٰهُ فَاَصَمَّهُمْ وَ اَعْمٰی اَبْصَارَهُمْ' },
      { type: 'text', text: '23] It is these whom Allah has cursed, so He made them deaf to the Truth and blinded their eyes.' },
      { type: 'arabic', text: 'اَفَلَا يَتَدَبَّرُوْنَ الْقُرْاٰنَ اَمْ عَلٰی قُلُوْبٍ اَقْفَالُهَا' },
      { type: 'text', text: '24] So do they not ponder the Qur’an deeply, or are there locks on some of their hearts?' },
      { type: 'arabic', text: 'اِنَّ الَّذِيْنَ ارْتَدُّوْا عَلٰۤى اَدْبَارِهِمْ مِّنْۢ بَعْدِ مَا تَبَيَّنَ لَهُمُ الْهُدَى ۙ الشَّيْطٰنُ سَوَّلَ لَهُمْ ؕ وَ اَمْلٰی لَهُمْ' },
      { type: 'text', text: '25] Indeed those who turn back after the guidance had become clear to them - Satan has deceived them; and made them optimistic of living for ages.' },
      { type: 'arabic', text: 'ذٰلِكَ بِاَنَّهُمْ قَالُوْا لِلَّذِيْنَ كَرِهُوْا مَا نَزَّلَ اللّٰهُ سَنُطِيْعُكُمْ فِيْ بَعْضِ الْاَمْرِ ۖ وَ اللّٰهُ يَعْلَمُ اِسْرَارَهُمْ' },
      { type: 'text', text: '26] This is because they said to those who dislike what Allah has sent down, “We will obey you regarding one matter *”; and Allah knows their secrets. (* To fight against the Holy Prophet).' },
      { type: 'arabic', text: 'فَكَيْفَ اِذَا تَوَفَّتْهُمُ الْمَلٰٓئِكَةُ يَضْرِبُوْنَ وُجُوْهَهُمْ وَ اَدْبَارَهُمْ' },
      { type: 'text', text: '27] So how (dreadful) will it be when the angels remove their souls, striking at their faces and their backs!' },
      { type: 'arabic', text: 'ذٰلِكَ بِاَنَّهُمُ اتَّبَعُوْا مَاۤ اَسْخَطَ اللّٰهَ وَ كَرِهُوْا رِضْوَانَهٗ فَاَحْبَطَ اَعْمَالَهُمْ' },
      { type: 'text', text: '28] This is because they followed the matter which displeases Allah, and they disliked what pleases Him - He therefore squandered away all their deeds.' },
      { type: 'arabic', text: 'اَمْ حَسِبَ الَّذِيْنَ فِيْ قُلُوْبِهِمْ مَّرَضٌ اَنْ لَّنْ يُّخْرِجَ اللّٰهُ اَضْغَانَهُمْ' },
      { type: 'text', text: '29] What! Do they, in whose hearts is a disease, fancy that Allah will not expose concealed enmities?' },
      { type: 'arabic', text: 'وَ لَوْ نَشَآءُ لَاَرَيْنٰكَهُمْ فَلَعَرَفْتَهُمْ بِسِيْمٰهُمْ ؕ وَ لَتَعْرِفَنَّهُمْ فِيْ لَحْنِ الْقَوْلِ ؕ وَ اللّٰهُ يَعْلَمُ اَعْمَالَهُمْ' },
      { type: 'text', text: '30] And if We will, We can show them to you so that you may recognise them by their faces; and you will surely recognise them by the way they talk; and Allah knows your deeds.' },
      { type: 'arabic', text: 'وَ لَنَبْلُوَنَّكُمْ حَتّٰى نَعْلَمَ الْمُجٰهِدِيْنَ مِنْكُمْ وَ الصّٰبِرِيْنَ ۙ وَ نَبْلُوَا۟ اَخْبَارَكُمْ' },
      { type: 'text', text: '31] And We shall indeed test you until We make known the warriors and the steadfast among you - and to test your proclamations.' },
      { type: 'arabic', text: 'اِنَّ الَّذِيْنَ كَفَرُوْا وَ صَدُّوْا عَنْ سَبِيْلِ اللّٰهِ وَ شَآقُّوا الرَّسُوْلَ مِنْۢ بَعْدِ مَا تَبَيَّنَ لَهُمُ الْهُدٰی ۙ لَنْ يَّضُرُّوا اللّٰهَ شَيْئًا ؕ وَ سَيُحْبِطُ اَعْمَالَهُمْ' },
      { type: 'text', text: '32] Indeed those who disbelieved and prevented others from Allah’s way, and opposed the Noble Messenger after the guidance had become clear to them - they cannot harm Allah in the least; and soon He will squander away their deeds.' },
      { type: 'arabic', text: 'يٰۤاَيُّهَا الَّذِيْنَ اٰمَنُوْۤا اَطِيْعُوا اللّٰهَ وَ اَطِيْعُوا الرَّسُوْلَ وَ لَا تُبْطِلُوْۤا اَعْمَالَهُمْ' },
      { type: 'text', text: '33] O People who Believe! Obey Allah and obey the Noble Messenger, and do not render your deeds void.' },
      { type: 'arabic', text: 'اِنَّ الَّذِيْنَ كَفَرُوْا وَ صَدُّوْا عَنْ سَبِيْلِ اللّٰهِ ثُمَّ مَاتُوْا وَ هُمْ كُفَّارٌ فَلَنْ يَّغْفِرَ اللّٰهُ لَهُمْ' },
      { type: 'text', text: '34] Indeed those who disbelieved and prevented others from Allah’s way, and then died as disbelievers - so Allah will never forgive them.' },
      { type: 'arabic', text: 'فَلَا تَهِنُوْا وَ تَدْعُوْۤا اِلَى السَّلْمِ ۖ وَ اَنْتُمُ الْاَعْلَوْنَ ۖ وَ اللّٰهُ مَعَكُمْ وَ لَنْ يَّتِرَكُمْ اَعْمَالَهُمْ' },
      { type: 'text', text: '35] Therefore do not relax, nor call towards truce by yourself; and it is you who will dominate; and Allah is with you, and He will never cause a loss in your deeds.' },
      { type: 'arabic', text: 'اِنَّمَا الْحَيٰوةُ الدُّنْيَا لَعِبٌ وَّ لَهْوٌ ؕ وَ اِنْ تُؤْمِنُوْا وَ تَتَّقُوْا يُؤْتِكُمْ اُجُوْرَكُمْ وَ لَا يَسْـَٔلْكُمْ اَمْوَالَكُمْ' },
      { type: 'text', text: '36] The worldly life is just a sport and pastime; and if you accept faith and be pious, He will bestow your rewards to you, and not at all ask you for your wealth.' },
      { type: 'arabic', text: 'اِنْ يَّسْـَٔلْكُمُوْهَا فَيُحْفِكُمْ تَبْخَلُوْا وَ يُخْرِجْ اَضْغَانَكُمْ' },
      { type: 'text', text: '37] Were He to ask it from you, and ask in plenty, you would be miserly, and the miserliness would expose the filth within your hearts.' },
      { type: 'arabic', text: 'هٰۤاَنْتُمْ هٰۤؤُلَآءِ تُدْعَوْنَ لِتُنْفِقُوْا فِيْ سَبِيْلِ اللّٰهِ ۚ فَمِنْكُمْ مَّنْ يَّبْخَلُ ۚ وَ مَنْ يَّبْخَلْ فَاِنَّمَا يَبْخَلُ عَنْ نَّفْسِهٖ ؕ وَ اللّٰهُ الْغَنِيُّ وَ اَنْتُمُ الْفُقَرَآءُ ۚ وَ اِنْ تَتَوَلَّوْا يَسْتَبْدِلْ قَوْمًا غَيْرَكُمْ ۙ ثُمَّ لَا يَكُوْنُوْۤا اَمْثَالَكُمْ' },
      { type: 'text', text: 'Allah - beginning with the name of - the Most Gracious, the Most Merciful' },
      { type: 'arabic', text: 'إِنَّا فَتَحْنَا لَكَ فَتْحًا مُّبِينًا' },
      { type: 'text', text: '1] We have indeed, for your sake (O dear Prophet Mohammed - peace and blessings be upon him), bestowed a clear victory.' },
      { type: 'arabic', text: 'لِّيَغْفِرَ لَكَ اللَّهُ مَا تَقَدَّمَ مِن ذَنبِكَ وَمَا تَأَخَّرَ وَيُتِمَّ نِعْمَتَهُ عَلَيْكَ وَيَهْدِيَكَ صِرَاطًا مُّسْتَقِيمًا' },
      { type: 'text', text: '2] So that Allah may forgive, for your sake, the sins of those before you and those after you, and complete His favours upon you, and to show you the Straight Path.' },
                { type: 'arabic', text: 'وَيَنصُرَكَ اللَّهُ نَصْرًا عَزِيزًا' },
                { type: 'text', text: '3] And so that Allah may provide you a great help.' },
                { type: 'arabic', text: 'هُوَ الَّذِي أَنزَلَ السَّكِينَةَ فِي قُلُوبِ الْمُؤْمِنِينَ لِيَزْدَادُوا إِيمَانًا مَّعَ إِيمَانِهِمْ ۖ وَلِلَّهِ جُنُودُ السَّمَاوَاتِ وَالْأَرْضِ ۚ وَكَانَ اللَّهُ عَلِيمًا حَكِيمًا' },
                { type: 'text', text: '4] It is He Who instilled peace in the hearts of the believers, so that it may increase their strength of conviction; and to Allah only belong the armies of the heavens and the earth; and Allah is All Knowing, Wise.' },
                { type: 'arabic', text: 'لِّيُدْخِلَ الْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ جَنَّاتٍ تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ خَالِدِينَ فِيهَا وَيُكَفِّرَ عَنْهُمْ سَيِّئَاتِهِمْ ۚ وَكَانَ ذَٰلِكَ عِندَ اللَّهِ فَوْزًا عَظِيمًا' },
                { type: 'text', text: '5] In order to admit the believing men and believing women into Gardens beneath which rivers flow, in which they will abide, and to relieve them of their misdeeds; and this, in Allah’s sight, is the greatest success.' },
                { type: 'arabic', text: 'وَيُعَذِّبَ الْمُنَافِقِينَ وَالْمُنَافِقَاتِ وَالْمُشْرِكِينَ وَالْمُشْرِكَاتِ الظَّانِّينَ بِاللَّهِ ظَنَّ السَّوْءِ ۚ عَلَيْهِمْ دَائِرَةُ السَّوْءِ ۖ وَغَضِبَ اللَّهُ عَلَيْهِمْ وَلَعَنَهُمْ وَأَعَدَّ لَهُمْ جَهَنَّمَ ۖ وَسَاءَتْ مَصِيرًا' },
                { type: 'text', text: '6] And to punish the hypocrite men and hypocrite women, and the polytheist men and polytheist women, who think evilly about Allah; upon them only is the evil cycle of misfortune; and Allah has wreaked anger upon them, and has cursed them, and has prepared hell for them; and what an evil destination.' },
                { type: 'arabic', text: 'وَلِلَّهِ جُنُودُ السَّمَاوَاتِ وَالْأَرْضِ ۚ وَكَانَ اللَّهُ عَزِيزًا حَكِيمًا' },
                { type: 'text', text: '7] And to Allah only belong the armies of the heavens and the earth; and Allah is Most Honourable, Wise.' },
                { type: 'arabic', text: 'إِنَّا أَرْسَلْنَاكَ شَاهِدًا وَمُبَشِّرًا وَنَذِيرًا' },
                { type: 'text', text: '8] We have indeed sent you (O dear Prophet Mohammed - peace and blessings be upon him) as a present witness and a Herald of glad tidings and warnings. (The Holy Prophet is a witness from Allah.)' },
                { type: 'arabic', text: 'لِّتُؤْمِنُوا بِاللَّهِ وَرَسُولِهِ وَتُعَزِّرُوهُ وَتُوَقِّرُوهُ وَتُسَبِّحُوهُ بُكْرَةً وَأَصِيلًا' },
                { type: 'text', text: '9] In order that you, O people, may accept faith in Allah and His Noble Messenger, and honour and revere the Noble Messenger; and may say the Purity of Allah, morning and evening. (To honour the Holy Prophet – peace and blessings be upon him – is part of faith. To disrespect him is blasphemy.)' },
                { type: 'arabic', text: 'إِنَّ الَّذِينَ يُبَايِعُونَكَ إِنَّمَا يُبَايِعُونَ اللَّهَ يَدُ اللَّهِ فَوْقَ أَيْدِيهِمْ ۚ فَمَن نَّكَثَ فَإِنَّمَا يَنكُثُ عَلَىٰ نَفْسِهِ ۖ وَمَنْ أَوْفَىٰ بِمَا عَاهَدَ عَلَيْهُ اللَّهَ فَسَيُؤْتِيهِ أَجْرًا عَظِيمًا' },
                { type: 'text', text: "10] Those who swear allegiance to you (O dear Prophet Mohammed - peace and blessings be upon him), do indeed in fact swear allegiance to Allah; Allah's Hand* of Power is above their hands; so whoever breaches his oath, has breached his own greater promise; and whoever fulfils the covenant he has with Allah - so very soon Allah will bestow upon him a great reward. (Used as a metaphor.)" },
                { type: 'hr' },
                { type: 'arabic', text: 'سَيَقُولُ لَكَ الْمُخَلَّفُونَ مِنَ الْأَعْرَابِ شَغَلَتْنَا أَمْوَالُنَا وَأَهْلُونَا فَاسْتَغْفِرْ لَنَا ۚ يَقُولُونَ بِأَلْسِنَتِهِم مَّا لَيْسَ فِي قُلُوبِهِمْ ۚ قُلْ فَمَن يَمْلِكُ لَكُم مِّنَ اللَّهِ شَيْئًا إِنْ أَرَادَ بِكُمْ ضَرًّا أَوْ أَرَادَ بِكُمْ نَفْعًا ۚ بَلْ كَانَ اللَّهُ بِمَا تَعْمَلُونَ خَبِيرًا' },
                { type: 'text', text: '11] The ignorant ones who had stayed behind will now say to you, “Our wealth and our families prevented us from going by keeping us pre-occupied, therefore seek forgiveness for us”; they utter with their tongues what is not in their hearts; say, “So does anyone have any control over you against Allah, if He wills to harm you or provide you benefit? In fact Allah is Aware of what you do.”' },
                { type: 'arabic', text: 'بَلْ ظَنَنتُمْ أَن لَّن يَنقَلِبَ الرَّسُولُ وَالْمُؤْمِنُونَ إِلَىٰ أَهْلِيهِمْ أَبَدًا وَزُيِّنَ ذَٰلِكَ فِي قُلُوبِكُمْ وَظَنَنتُمْ ظَنَّ السَّوْءِ وَكُنتُمْ قَوْمًا بُورًا' },
                { type: 'text', text: '12] “Rather you had assumed that the Noble Messenger and the Muslims will never return to their homes, and you thought this as good within your hearts, whereas you had thought evilly; and you were a people about to be ruined.”' },
                { type: 'arabic', text: 'وَمَن لَّمْ يُؤْمِن بِاللَّهِ وَرَسُولِهِ فَإِنَّا أَعْتَدْنَا لِلْكَافِرِينَ سَعِيرًا' },
                { type: 'text', text: '13] And whoever does not accept faith in Allah and His Noble Messenger - We have indeed kept prepared a blazing fire for disbelievers.' },
                { type: 'arabic', text: 'وَلِلَّهِ مُلْكُ السَّمَاوَاتِ وَالْأَرْضِ ۚ يَغْفِرُ لِمَن يَشَاءُ وَيُعَذِّبُ مَن يَشَاءُ ۚ وَكَانَ اللَّهُ غَفُورًا رَّحِيمًا' },
                { type: 'text', text: '14] And for Allah only is the kingship of the heavens and the earth; He may forgive whomever He wills, and punish whomever He wills; and Allah is Oft Forgiving, Most Merciful.' },
                { type: 'arabic', text: 'سَيَقُولُ الْمُخَلَّفُونَ إِذَا انطَلَقْتُمْ إِلَىٰ مَغَانِمَ لِتَأْخُذُوهَا ذَرُونَا نَتَّبِعْكُمْ ۖ يُرِيدُونَ أَن يُبَدِّلُوا كَلَامَ اللَّهِ ۚ قُل لَّن تَتَّبِعُونَا كَذَٰلِكُمْ قَالَ اللَّهُ مِن قَبْلُ ۖ فَسَيَقُولُونَ بَلْ تَحْسُدُونَا ۚ بَلْ كَانُوا لَا يَفْقَهُونَ إِلَّا قَلِيلًا' },
                { type: 'text', text: '15] Those who had stayed behind will now say, “When you go to receive the war booty, let us also go with you”; they wish to change the Words of Allah; say “You shall never come with us - this is already decreed by Allah”; so they will now say, “But rather you envy us”; in fact they never understood except a little.' },
                { type: 'arabic', text: 'قُل لِّلْمُخَلَّفِينَ مِنَ الْأَعْرَابِ سَتُدْعَوْنَ إِلَىٰ قَوْمٍ أُولِي بَأْسٍ شَدِيدٍ تُقَاتِلُونَهُمْ أَوْ يُسْلِمُونَ ۖ فَإِن تُطِيعُوا يُؤْتِكُمُ اللَّهُ أَجْرًا حَسَنًا ۖ وَإِن تَتَوَلَّوْا كَمَا تَوَلَّيْتُم مِّن قَبْلُ يُعَذِّبْكُمْ عَذَابًا أَلِيمًا' },
                { type: 'text', text: '16] Say to the ignorant who stayed behind, “You will soon be called against a nation of great military strength - to fight against them or that they become Muslims; so if you obey, Allah will give you an excellent reward; and if you turn away, the way you had turned away before, He will mete out a painful punishment to you.”' },
                { type: 'arabic', text: 'لَّيْسَ عَلَى الْأَعْمَىٰ حَرَجٌ وَلَا عَلَى الْأَعْرَجِ حَرَجٌ وَلَا عَلَى الْمَرِيضِ حَرَجٌ ۗ وَمَن يُطِعِ اللَّهَ وَرَسُولَهُ يُدْخِلْهُ جَنَّاتٍ تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ ۖ وَمَن يَتَوَلَّ يُعَذِّبْهُ عَذَابًا أَلِيمًا' },
                { type: 'text', text: '17] There is no reproach upon the blind, nor reproach against the lame, nor reproach upon the sick; and whoever obeys Allah and His Noble Messenger - Allah will admit him into Gardens beneath which rivers flow; and whoever turns away - He will mete out a painful punishment to him.' },
                { type: 'hr' },
                { type: 'arabic', text: 'لَّقَدْ رَضِيَ اللَّهُ عَنِ الْمُؤْمِنِينَ إِذْ يُبَايِعُونَكَ تَحْتَ الشَّجَرَةِ فَعَلِمَ مَا فِي قُلُوبِهِمْ فَأَنزَلَ السَّكِينَةَ عَلَيْهِمْ وَأَثَابَهُمْ فَتْحًا قَرِيبًا' },
                { type: 'text', text: '18] Indeed Allah was truly pleased with the believers when they swore allegiance to you beneath the tree - so He knew what was in their hearts - He therefore sent down peace upon them, and rewarded them with an imminent victory.' },
                { type: 'arabic', text: 'وَمَغَانِمَ كَثِيرَةً يَأْخُذُونَهَا ۗ وَكَانَ اللَّهُ عَزِيزًا حَكِيمًا' },
                { type: 'text', text: '19] And plenty of war booty, to take; and Allah is Most Honourable, Wise.' },
                { type: 'arabic', text: 'وَعَدَكُمُ اللَّهُ مَغَانِمَ كَثِيرَةً تَأْخُذُونَهَا فَعَجَّلَ لَكُمْ هَٰذِهِ وَكَفَّ أَيْدِيَ النَّاسِ عَنكُمْ وَلِتَكُونَ آيَةً لِّلْمُؤْمِنِينَ وَيَهْدِيَكُمْ صِرَاطًا مُّسْتَقِيمًا' },
                { type: 'text', text: '20] Allah has promised you plenty of booty which you will take, and has bestowed this to you quickly, and restrained peoples’ hands from you; and in order that it may be a sign for the believers, and to guide you on the Straight Path.' },
                { type: 'arabic', text: 'وَأُخْرَىٰ لَمْ تَقْدِرُوا عَلَيْهَا قَدْ أَحَاطَ اللَّهُ بِهَا ۚ وَكَانَ اللَّهُ عَلَىٰ كُلِّ شَيْءٍ قَدِيرًا' },
                { type: 'text', text: '21] And one more, not within your capacity, is within Allah’s hold; and Allah is Able to do all things.' },
                { type: 'arabic', text: 'وَلَوْ قَاتَلَكُمُ الَّذِينَ كَفَرُوا لَوَلَّوُا الْأَدْبَارَ ثُمَّ لَا يَجِدُونَ وَلِيًّا وَلَا نَصِيرًا' },
                { type: 'text', text: '22] And if the disbelievers were to fight you, they will turn away and flee, and then they will not find any supporter nor any aide.' },
                { type: 'arabic', text: 'سُنَّةَ اللَّهِ الَّتِي قَدْ خَلَتْ مِن قَبْلُ ۖ وَلَن تَجِدَ لِسُنَّةِ اللَّهِ تَبْدِيلاً' },
                { type: 'text', text: '23] The tradition of Allah, ongoing since before; and you will not find the tradition of Allah changing.' },
                { type: 'arabic', text: 'وَهُوَ الَّذِي كَفَّ أَيْدِيَهُمْ عَنكُمْ وَأَيْدِيَكُمْ عَنْهُم بِبَطْنِ مَكَّةَ مِن بَعْدِ أَنْ أَظْفَرَكُمْ عَلَيْهِمْ ۚ وَكَانَ اللَّهُ بِمَا تَعْمَلُونَ بَصِيرًا' },
                { type: 'text', text: '24] And it is He Who restrained their hands from you, and your hands from them in the valley of Mecca, after having given you control over them; and Allah sees all what you do.' },
                { type: 'arabic', text: 'هُمُ الَّذِينَ كَفَرُوا وَصَدُّوكُمْ عَنِ الْمَسْجِدِ الْحَرَامِ وَالْهَدْيَ مَعْكُوفًا أَن يَبْلُغَ مَحِلَّهُ ۚ وَلَوْلَا رِجَالٌ مُّؤْمِنُونَ وَنِسَاءٌ مُّؤْمِنَاتٌ لَّمْ تَعْلَمُوهُمْ أَن تَطَؤُوهُمْ فَتُصِيبَكُم مِّنْهُم مَّعَرَّةٌ بِغَيْرِ عِلْمٍ ۖ لِّيُدْخِلَ اللَّهُ فِي رَحْمَتِهِ مَن يَشَاءُ ۚ لَوْ تَزَيَّلُوا لَعَذَّبْنَا الَّذِينَ كَفَرُوا مِنْهُمْ عَذَابًا أَلِيمًا' },
                { type: 'text', text: '25] It was these who disbelieved and prevented you from the Sacred Mosque, and stopped the sacrificial animals from reaching their place; and were it not for some Muslim men and Muslim women, whom you do not know - lest you may crush them and unintentionally incur some violation due to them - Allah would have permitted you to slay them; this relief for them, is so that Allah may admit into His mercy whomever He wills; and had they been separated, We would have indeed punished the disbelievers among them with a painful punishment.' },
                { type: 'hr' },
                { type: 'arabic', text: 'إِذْ جَعَلَ الَّذِينَ كَفَرُوا فِي قُلُوبِهِمُ الْحَمِيَّةَ حَمِيَّةَ الْجَاهِلِيَّةِ فَأَنزَلَ اللَّهُ سَكِينَتَهُ عَلَىٰ رَسُولِهِ وَعَلَى الْمُؤْمِنِينَ وَأَلْزَمَهُمْ كَلِمَةَ التَّقْوَىٰ وَكَانُوا أَحَقَّ بِهَا وَأَهْلَهَا ۚ وَكَانَ اللَّهُ بِكُلِّ شَيْءٍ عَلِيمًا' },
                { type: 'text', text: '26] Whereas the disbelievers had set up in their hearts an obstinacy - the same obstacy of the days of ignorance - so Allah sent down His solace upon His Noble Messenger and upon the believers, and decreed upon them the words of piety, and they were more deserving and suitable for it; and Allah is the All Knowing.' },
                { type: 'arabic', text: 'لَّقَدْ صَدَقَ اللَّهُ رَسُولَهُ الرُّؤْيَا بِالْحَقِّ ۖ لَتَدْخُلُنَّ الْمَسْجِدَ الْحَرَامَ إِن شَاءَ اللَّهُ آمِنِينَ مُحَلِّقِينَ رُءُوسَكُمْ وَمُقَصِّرِينَ لَا تَخَافُونَ ۖ فَعَلِمَ مَا لَمْ تَعْلَمُوا فَجَعَلَ مِن دُونِ ذَٰلِكَ فَتْحًا قَرِيبًا' },
                { type: 'text', text: '27] Allah has indeed made the truthful dream of His Noble Messenger, come true; indeed you will all enter the Sacred Mosque, if Allah wills, in safety - with your heads shaven or hair cut short - without fear; so He knows what you do not know, and has therefore ordained another imminent victory before this.' },
                { type: 'arabic', text: 'هُوَ الَّذِي أَرْسَلَ رَسُولَهُ بِالْهُدَىٰ وَدِينِ الْحَقِّ لِيُظْهِرَهُ عَلَى الدِّينِ كُلِّهِ ۚ وَكَفَىٰ بِاللَّهِ شَهِيدًا' },
                { type: 'text', text: '28] It is He Who has sent His Noble Messenger with the guidance and the true religion, in order to make it prevail over all other religions; and Allah is sufficient as a Witness. (The Holy Prophet is a light from Allah.)' },
                { type: 'arabic', text: 'مُّحَمَّدٌ رَّسُولُ اللَّهِ ۚ وَالَّذِينَ مَعَهُ أَشِدَّاءُ عَلَى الْكُفَّارِ رُحَمَاءُ بَيْنَهُمْ ۖ تَرَاهُمْ رُكَّعًا سُجَّدًا يَبْتَغُونَ فَضْلًا مِّنَ اللَّهِ وَرِضْوَانًا ۖ سِيمَاهُمْ فِي وُجُوهِهِم مِّنْ أَثَرِ السُّجُودِ ۚ ذَٰلِكَ مَثَلُهُمْ فِي التَّوْرَاةِ ۚ وَمَثَلُهُمْ فِي الْإِنجِيلِ كَزَرْعٍ أَخْرَجَ شَطْأَهُ فَآزَرَهُ فَاسْتَغْلَظَ فَاسْتَوَىٰ عَلَىٰ سُوقِهِ يُعْجِبُ الزُّرَّاعَ لِيَغِيظَ بِهِمُ الْكُفَّارَ ۗ وَعَدَ اللَّهُ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ مِنْهُم مَّغْفِرَةً وَأَجْرًا عَظِيمًا' },
                { type: 'text', text: '29] Mohammed (peace and blessings be upon him) is the Noble Messenger of Allah; and his companions are stern with the disbelievers and merciful among themselves - you will see them bowing and falling in prostration, seeking Allah’s munificence and His pleasure; their signs are on their faces, from the effects of prostrations; this trait of theirs is mentioned in the Taurat; and their trait is mentioned in the Injeel; like a cultivation that sprouted its shoot, then strengthened it, then thickened and then stood firm upon its stem, pleasing the farmer - in order to enrage the disbelievers with them; Allah has promised forgiveness and a great reward to those among them who have faith and do good deeds.' }
            ]
        },

        {
            id: 48, name: "AL FATH", ar: "الفتح", juz: 26,
            audio: 'https://server10.mp3quran.net/minsh/048.mp3',
            content: [
                { type: 'section-title', text: 'AL FATH (THE VICTORY)' },
                { type: 'text', text: '(Revealed at Medinah - contains 29 verses - Para 48)' },
                { type: 'arabic', text: 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ' },
                { type: 'text', text: 'Allah - beginning with the name of - the Most Gracious, the Most Merciful' },
      { type: 'arabic', text: 'إِنَّا فَتَحْنَا لَكَ فَتْحًا مُّبِينًا' },
      { type: 'text', text: '1] We have indeed, for your sake (O dear Prophet Mohammed - peace and blessings be upon him), bestowed a clear victory.' },
      { type: 'arabic', text: 'لِّيَغْفِرَ لَكَ اللَّهُ مَا تَقَدَّمَ مِن ذَنبِكَ وَمَا تَأَخَّرَ وَيُتِمَّ نِعْمَتَهُ عَلَيْكَ وَيَهْدِيَكَ صِرَاطًا مُّسْتَقِيمًا' },
      { type: 'text', text: '2] So that Allah may forgive, for your sake, the sins of those before you and those after you, and complete His favours upon you, and to show you the Straight Path.' },
                { type: 'arabic', text: 'وَيَنصُرَكَ اللَّهُ نَصْرًا عَزِيزًا' },
                { type: 'text', text: '3] And so that Allah may provide you a great help.' },
                { type: 'arabic', text: 'هُوَ الَّذِي أَنزَلَ السَّكِينَةَ فِي قُلُوبِ الْمُؤْمِنِينَ لِيَزْدَادُوا إِيمَانًا مَّعَ إِيمَانِهِمْ ۖ وَلِلَّهِ جُنُودُ السَّمَاوَاتِ وَالْأَرْضِ ۚ وَكَانَ اللَّهُ عَلِيمًا حَكِيمًا' },
                { type: 'text', text: '4] It is He Who instilled peace in the hearts of the believers, so that it may increase their strength of conviction; and to Allah only belong the armies of the heavens and the earth; and Allah is All Knowing, Wise.' },
                { type: 'arabic', text: 'لِّيُدْخِلَ الْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ جَنَّاتٍ تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ خَالِدِينَ فِيهَا وَيُكَفِّرَ عَنْهُمْ سَيِّئَاتِهِمْ ۚ وَكَانَ ذَٰلِكَ عِندَ اللَّهِ فَوْزًا عَظِيمًا' },
                { type: 'text', text: '5] In order to admit the believing men and believing women into Gardens beneath which rivers flow, in which they will abide, and to relieve them of their misdeeds; and this, in Allah’s sight, is the greatest success.' },
                { type: 'arabic', text: 'وَيُعَذِّبَ الْمُنَافِقِينَ وَالْمُنَافِقَاتِ وَالْمُشْرِكِينَ وَالْمُشْرِكَاتِ الظَّانِّينَ بِاللَّهِ ظَنَّ السَّوْءِ ۚ عَلَيْهِمْ دَائِرَةُ السَّوْءِ ۖ وَغَضِبَ اللَّهُ عَلَيْهِمْ وَلَعَنَهُمْ وَأَعَدَّ لَهُمْ جَهَنَّمَ ۖ وَسَاءَتْ مَصِيرًا' },
                { type: 'text', text: '6] And to punish the hypocrite men and hypocrite women, and the polytheist men and polytheist women, who think evilly about Allah; upon them only is the evil cycle of misfortune; and Allah has wreaked anger upon them, and has cursed them, and has prepared hell for them; and what an evil destination.' },
                { type: 'arabic', text: 'وَلِلَّهِ جُنُودُ السَّمَاوَاتِ وَالْأَرْضِ ۚ وَكَانَ اللَّهُ عَزِيزًا حَكِيمًا' },
                { type: 'text', text: '7] And to Allah only belong the armies of the heavens and the earth; and Allah is Most Honourable, Wise.' },
                { type: 'arabic', text: 'إِنَّا أَرْسَلْنَاكَ شَاهِدًا وَمُبَشِّرًا وَنَذِيرًا' },
                { type: 'text', text: '8] We have indeed sent you (O dear Prophet Mohammed - peace and blessings be upon him) as a present witness and a Herald of glad tidings and warnings. (The Holy Prophet is a witness from Allah.)' },
                { type: 'arabic', text: 'لِّتُؤْمِنُوا بِاللَّهِ وَرَسُولِهِ وَتُعَزِّرُوهُ وَتُوَقِّرُوهُ وَتُسَبِّحُوهُ بُكْرَةً وَأَصِيلًا' },
                { type: 'text', text: '9] In order that you, O people, may accept faith in Allah and His Noble Messenger, and honour and revere the Noble Messenger; and may say the Purity of Allah, morning and evening. (To honour the Holy Prophet – peace and blessings be upon him – is part of faith. To disrespect him is blasphemy.)' },
                { type: 'arabic', text: 'إِنَّ الَّذِينَ يُبَايِعُونَكَ إِنَّمَا يُبَايِعُونَ اللَّهَ يَدُ اللَّهِ فَوْقَ أَيْدِيهِمْ ۚ فَمَن نَّكَثَ فَإِنَّمَا يَنكُثُ عَلَىٰ نَفْسِهِ ۖ وَمَنْ أَوْفَىٰ بِمَا عَاهَدَ عَلَيْهُ اللَّهَ فَسَيُؤْتِيهِ أَجْرًا عَظِيمًا' },
                { type: 'text', text: "10] Those who swear allegiance to you (O dear Prophet Mohammed - peace and blessings be upon him), do indeed in fact swear allegiance to Allah; Allah's Hand* of Power is above their hands; so whoever breaches his oath, has breached his own greater promise; and whoever fulfils the covenant he has with Allah - so very soon Allah will bestow upon him a great reward. (Used as a metaphor.)" },
                { type: 'hr' },
                { type: 'arabic', text: 'سَيَقُولُ لَكَ الْمُخَلَّفُونَ مِنَ الْأَعْرَابِ شَغَلَتْنَا أَمْوَالُنَا وَأَهْلُونَا فَاسْتَغْفِرْ لَنَا ۚ يَقُولُونَ بِأَلْسِنَتِهِم مَّا لَيْسَ فِي قُلُوبِهِمْ ۚ قُلْ فَمَن يَمْلِكُ لَكُم مِّنَ اللَّهِ شَيْئًا إِنْ أَرَادَ بِكُمْ ضَرًّا أَوْ أَرَادَ بِكُمْ نَفْعًا ۚ بَلْ كَانَ اللَّهُ بِمَا تَعْمَلُونَ خَبِيرًا' },
                { type: 'text', text: '11] The ignorant ones who had stayed behind will now say to you, “Our wealth and our families prevented us from going by keeping us pre-occupied, therefore seek forgiveness for us”; they utter with their tongues what is not in their hearts; say, “So does anyone have any control over you against Allah, if He wills to harm you or provide you benefit? In fact Allah is Aware of what you do.”' },
                { type: 'arabic', text: 'بَلْ ظَنَنتُمْ أَن لَّن يَنقَلِبَ الرَّسُولُ وَالْمُؤْمِنُونَ إِلَىٰ أَهْلِيهِمْ أَبَدًا وَزُيِّنَ ذَٰلِكَ فِي قُلُوبِكُمْ وَظَنَنتُمْ ظَنَّ السَّوْءِ وَكُنتُمْ قَوْمًا بُورًا' },
                { type: 'text', text: '12] “Rather you had assumed that the Noble Messenger and the Muslims will never return to their homes, and you thought this as good within your hearts, whereas you had thought evilly; and you were a people about to be ruined.”' },
                { type: 'arabic', text: 'وَمَن لَّمْ يُؤْمِن بِاللَّهِ وَرَسُولِهِ فَإِنَّا أَعْتَدْنَا لِلْكَافِرِينَ سَعِيرًا' },
                { type: 'text', text: '13] And whoever does not accept faith in Allah and His Noble Messenger - We have indeed kept prepared a blazing fire for disbelievers.' },
                { type: 'arabic', text: 'وَلِلَّهِ مُلْكُ السَّمَاوَاتِ وَالْأَرْضِ ۚ يَغْفِرُ لِمَن يَشَاءُ وَيُعَذِّبُ مَن يَشَاءُ ۚ وَكَانَ اللَّهُ غَفُورًا رَّحِيمًا' },
                { type: 'text', text: '14] And for Allah only is the kingship of the heavens and the earth; He may forgive whomever He wills, and punish whomever He wills; and Allah is Oft Forgiving, Most Merciful.' },
                { type: 'arabic', text: 'سَيَقُولُ الْمُخَلَّفُونَ إِذَا انطَلَقْتُمْ إِلَىٰ مَغَانِمَ لِتَأْخُذُوهَا ذَرُونَا نَتَّبِعْكُمْ ۖ يُرِيدُونَ أَن يُبَدِّلُوا كَلَامَ اللَّهِ ۚ قُل لَّن تَتَّبِعُونَا كَذَٰلِكُمْ قَالَ اللَّهُ مِن قَبْلُ ۖ فَسَيَقُولُونَ بَلْ تَحْسُدُونَا ۚ بَلْ كَانُوا لَا يَفْقَهُونَ إِلَّا قَلِيلًا' },
                { type: 'text', text: '15] Those who had stayed behind will now say, “When you go to receive the war booty, let us also go with you”; they wish to change the Words of Allah; say “You shall never come with us - this is already decreed by Allah”; so they will now say, “But rather you envy us”; in fact they never understood except a little.' },
                { type: 'arabic', text: 'قُل لِّلْمُخَلَّفِينَ مِنَ الْأَعْرَابِ سَتُدْعَوْنَ إِلَىٰ قَوْمٍ أُولِي بَأْسٍ شَدِيدٍ تُقَاتِلُونَهُمْ أَوْ يُسْلِمُونَ ۖ فَإِن تُطِيعُوا يُؤْتِكُمُ اللَّهُ أَجْرًا حَسَنًا ۖ وَإِن تَتَوَلَّوْا كَمَا تَوَلَّيْتُم مِّن قَبْلُ يُعَذِّبْكُمْ عَذَابًا أَلِيمًا' },
                { type: 'text', text: '16] Say to the ignorant who stayed behind, “You will soon be called against a nation of great military strength - to fight against them or that they become Muslims; so if you obey, Allah will give you an excellent reward; and if you turn away, the way you had turned away before, He will mete out a painful punishment to you.”' },
                { type: 'arabic', text: 'لَّيْسَ عَلَى الْأَعْمَىٰ حَرَجٌ وَلَا عَلَى الْأَعْرَجِ حَرَجٌ وَلَا عَلَى الْمَرِيضِ حَرَجٌ ۗ وَمَن يُطِعِ اللَّهَ وَرَسُولَهُ يُدْخِلْهُ جَنَّاتٍ تَجْرِي مِن تَحْتِهَا الْأَنْهَارُ ۖ وَمَن يَتَوَلَّ يُعَذِّبْهُ عَذَابًا أَلِيمًا' },
                { type: 'text', text: '17] There is no reproach upon the blind, nor reproach against the lame, nor reproach upon the sick; and whoever obeys Allah and His Noble Messenger - Allah will admit him into Gardens beneath which rivers flow; and whoever turns away - He will mete out a painful punishment to him.' },
                { type: 'hr' },
                { type: 'arabic', text: 'لَّقَدْ رَضِيَ اللَّهُ عَنِ الْمُؤْمِنِينَ إِذْ يُبَايِعُونَكَ تَحْتَ الشَّجَرَةِ فَعَلِمَ مَا فِي قُلُوبِهِمْ فَأَنزَلَ السَّكِينَةَ عَلَيْهِمْ وَأَثَابَهُمْ فَتْحًا قَرِيبًا' },
                { type: 'text', text: '18] Indeed Allah was truly pleased with the believers when they swore allegiance to you beneath the tree - so He knew what was in their hearts - He therefore sent down peace upon them, and rewarded them with an imminent victory.' },
                { type: 'arabic', text: 'وَمَغَانِمَ كَثِيرَةً يَأْخُذُونَهَا ۗ وَكَانَ اللَّهُ عَزِيزًا حَكِيمًا' },
                { type: 'text', text: '19] And plenty of war booty, to take; and Allah is Most Honourable, Wise.' },
                { type: 'arabic', text: 'وَعَدَكُمُ اللَّهُ مَغَانِمَ كَثِيرَةً تَأْخُذُونَهَا فَعَجَّلَ لَكُمْ هَٰذِهِ وَكَفَّ أَيْدِيَ النَّاسِ عَنكُمْ وَلِتَكُونَ آيَةً لِّلْمُؤْمِنِينَ وَيَهْدِيَكُمْ صِرَاطًا مُّسْتَقِيمًا' },
                { type: 'text', text: '20] Allah has promised you plenty of booty which you will take, and has bestowed this to you quickly, and restrained peoples’ hands from you; and in order that it may be a sign for the believers, and to guide you on the Straight Path.' },
                { type: 'arabic', text: 'وَأُخْرَىٰ لَمْ تَقْدِرُوا عَلَيْهَا قَدْ أَحَاطَ اللَّهُ بِهَا ۚ وَكَانَ اللَّهُ عَلَىٰ كُلِّ شَيْءٍ قَدِيرًا' },
                { type: 'text', text: '21] And one more, not within your capacity, is within Allah’s hold; and Allah is Able to do all things.' },
                { type: 'arabic', text: 'وَلَوْ قَاتَلَكُمُ الَّذِينَ كَفَرُوا لَوَلَّوُا الْأَدْبَارَ ثُمَّ لَا يَجِدُونَ وَلِيًّا وَلَا نَصِيرًا' },
                { type: 'text', text: '22] And if the disbelievers were to fight you, they will turn away and flee, and then they will not find any supporter nor any aide.' },
                { type: 'arabic', text: 'سُنَّةَ اللَّهِ الَّتِي قَدْ خَلَتْ مِن قَبْلُ ۖ وَلَن تَجِدَ لِسُنَّةِ اللَّهِ تَبْدِيلاً' },
                { type: 'text', text: '23] The tradition of Allah, ongoing since before; and you will not find the tradition of Allah changing.' },
                { type: 'arabic', text: 'وَهُوَ الَّذِي كَفَّ أَيْدِيَهُمْ عَنكُمْ وَأَيْدِيَكُمْ عَنْهُم بِبَطْنِ مَكَّةَ مِن بَعْدِ أَنْ أَظْفَرَكُمْ عَلَيْهِمْ ۚ وَكَانَ اللَّهُ بِمَا تَعْمَلُونَ بَصِيرًا' },
                { type: 'text', text: '24] And it is He Who restrained their hands from you, and your hands from them in the valley of Mecca, after having given you control over them; and Allah sees all what you do.' },
                { type: 'arabic', text: 'هُمُ الَّذِينَ كَفَرُوا وَصَدُّوكُمْ عَنِ الْمَسْجِدِ الْحَرَامِ وَالْهَدْيَ مَعْكُوفًا أَن يَبْلُغَ مَحِلَّهُ ۚ وَلَوْلَا رِجَالٌ مُّؤْمِنُونَ وَنِسَاءٌ مُّؤْمِنَاتٌ لَّمْ تَعْلَمُوهُمْ أَن تَطَؤُوهُمْ فَتُصِيبَكُم مِّنْهُم مَّعَرَّةٌ بِغَيْرِ عِلْمٍ ۖ لِّيُدْخِلَ اللَّهُ فِي رَحْمَتِهِ مَن يَشَاءُ ۚ لَوْ تَزَيَّلُوا لَعَذَّبْنَا الَّذِينَ كَفَرُوا مِنْهُمْ عَذَابًا أَلِيمًا' },
                { type: 'text', text: '25] It was these who disbelieved and prevented you from the Sacred Mosque, and stopped the sacrificial animals from reaching their place; and were it not for some Muslim men and Muslim women, whom you do not know - lest you may crush them and unintentionally incur some violation due to them - Allah would have permitted you to slay them; this relief for them, is so that Allah may admit into His mercy whomever He wills; and had they been separated, We would have indeed punished the disbelievers among them with a painful punishment.' },
                { type: 'hr' },
                { type: 'arabic', text: 'إِذْ جَعَلَ الَّذِينَ كَفَرُوا فِي قُلُوبِهِمُ الْحَمِيَّةَ حَمِيَّةَ الْجَاهِلِيَّةِ فَأَنزَلَ اللَّهُ سَكِينَتَهُ عَلَىٰ رَسُولِهِ وَعَلَى الْمُؤْمِنِينَ وَأَلْزَمَهُمْ كَلِمَةَ التَّقْوَىٰ وَكَانُوا أَحَقَّ بِهَا وَأَهْلَهَا ۚ وَكَانَ اللَّهُ بِكُلِّ شَيْءٍ عَلِيمًا' },
                { type: 'text', text: '26] Whereas the disbelievers had set up in their hearts an obstinacy - the same obstacy of the days of ignorance - so Allah sent down His solace upon His Noble Messenger and upon the believers, and decreed upon them the words of piety, and they were more deserving and suitable for it; and Allah is the All Knowing.' },
                { type: 'arabic', text: 'لَّقَدْ صَدَقَ اللَّهُ رَسُولَهُ الرُّؤْيَا بِالْحَقِّ ۖ لَتَدْخُلُنَّ الْمَسْجِدَ الْحَرَامَ إِن شَاءَ اللَّهُ آمِنِينَ مُحَلِّقِينَ رُءُوسَكُمْ وَمُقَصِّرِينَ لَا تَخَافُونَ ۖ فَعَلِمَ مَا لَمْ تَعْلَمُوا فَجَعَلَ مِن دُونِ ذَٰلِكَ فَتْحًا قَرِيبًا' },
                { type: 'text', text: '27] Allah has indeed made the truthful dream of His Noble Messenger, come true; indeed you will all enter the Sacred Mosque, if Allah wills, in safety - with your heads shaven or hair cut short - without fear; so He knows what you do not know, and has therefore ordained another imminent victory before this.' },
                { type: 'arabic', text: 'هُوَ الَّذِي أَرْسَلَ رَسُولَهُ بِالْهُدَىٰ وَدِينِ الْحَقِّ لِيُظْهِرَهُ عَلَى الدِّينِ كُلِّهِ ۚ وَكَفَىٰ بِاللَّهِ شَهِيدًا' },
                { type: 'text', text: '28] It is He Who has sent His Noble Messenger with the guidance and the true religion, in order to make it prevail over all other religions; and Allah is sufficient as a Witness. (The Holy Prophet is a light from Allah.)' },
                { type: 'arabic', text: 'مُّحَمَّدٌ رَّسُولُ اللَّهِ ۚ وَالَّذِينَ مَعَهُ أَشِدَّاءُ عَلَى الْكُفَّارِ رُحَمَاءُ بَيْنَهُمْ ۖ تَرَاهُمْ رُكَّعًا سُجَّدًا يَبْتَغُونَ فَضْلًا مِّنَ اللَّهِ وَرِضْوَانًا ۖ سِيمَاهُمْ فِي وُجُوهِهِم مِّنْ أَثَرِ السُّجُودِ ۚ ذَٰلِكَ مَثَلُهُمْ فِي التَّوْرَاةِ ۚ وَمَثَلُهُمْ فِي الْإِنجِيلِ كَزَرْعٍ أَخْرَجَ شَطْأَهُ فَآزَرَهُ فَاسْتَغْلَظَ فَاسْتَوَىٰ عَلَىٰ سُوقِهِ يُعْجِبُ الزُّرَّاعَ لِيَغِيظَ بِهِمُ الْكُفَّارَ ۗ وَعَدَ اللَّهُ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ مِنْهُم مَّغْفِرَةً وَأَجْرًا عَظِيمًا' },
                { type: 'text', text: '29] Mohammed (peace and blessings be upon him) is the Noble Messenger of Allah; and his companions are stern with the disbelievers and merciful among themselves - you will see them bowing and falling in prostration, seeking Allah’s munificence and His pleasure; their signs are on their faces, from the effects of prostrations; this trait of theirs is mentioned in the Taurat; and their trait is mentioned in the Injeel; like a cultivation that sprouted its shoot, then strengthened it, then thickened and then stood firm upon its stem, pleasing the farmer - in order to enrage the disbelievers with them; Allah has promised forgiveness and a great reward to those among them who have faith and do good deeds.' }

                { type: 'text', text: 'Allah - beginning with the name of - the Most Gracious, the Most Merciful' },
      { type: 'arabic', text: 'يٰۤاَيُّهَا الَّذِيْنَ اٰمَنُوْا لَا تُقَدِّمُوْا بَيْنَ يَدَیِ اللّٰهِ وَ رَسُوْلِهٖ وَ اتَّقُوا اللّٰهَ ؕ اِنَّ اللّٰهَ سَمِيْعٌ عَلِيْمٌ' },
      { type: 'text', text: '1] O People who Believe! Do not advance ahead of Allah and His Noble Messenger, and fear Allah; indeed Allah is All Hearing, All Knowing.' },
      { type: 'arabic', text: 'يٰۤاَيُّهَا الَّذِيْنَ اٰمَنُوْا لَا تَرْفَعُوْۤا اَصْوَاتَكُمْ فَوْقَ صَوْتِ النَّبِیِّ وَ لَا تَجْهَرُوْا لَهٗ بِالْقَوْلِ كَجَهْرِ بَعْضِكُمْ لِبَعْضٍ اَنْ تَحْبَطَ اَعْمَالُكُمْ وَ اَنْتُمْ لَا تَشْعُرُوْنَ' },
      { type: 'text', text: '2] O People who Believe! Do not raise your voices higher than the voice of the Prophet, nor speak to him loudly the way you shout to one another, lest your deeds go to waste whilst you are unaware. (Faith will go waste due to the slightest disrespect towards the Holy Prophet - peace and blessings be upon him. To honour him is part of faith. To disrespect him is blasphemy.)' },
      { type: 'arabic', text: 'اِنَّ الَّذِيْنَ يَغُضُّوْنَ اَصْوَاتَهُمْ عِنْدَ رَسُوْلِ اللّٰهِ اُولٰٓئِكَ الَّذِيْنَ امْتَحَنَ اللّٰهُ قُلُوْبَهُمْ لِلتَّقْوٰی ؕ لَهُمْ مَّغْفِرَةٌ وَّ اَجْرٌ عَظِيْمٌ' },
      { type: 'text', text: '3] Indeed those who suppress their voices in the presence of Allah’s Noble Messenger, are the ones whose hearts Allah has tested for piety; for them is forgiveness, and a great reward.' },
      { type: 'arabic', text: 'اِنَّ الَّذِيْنَ يُنَادُوْنَكَ مِنْ وَّرَآءِ الْحُجُرٰتِ اَكْثَرُهُمْ لَا يَعْقِلُوْنَ' },
      { type: 'text', text: '4] Indeed most of those who call you from outside the chambers do not have sense.' },
      { type: 'arabic', text: 'وَ لَوْ اَنَّهُمْ صَبَرُوْا حَتّٰى تَخْرُجَ اِلَيْهِمْ لَكَانَ خَيْرًا لَّهُمْ ؕ وَ اللّٰهُ غَفُوْرٌ رَّحِيْمٌ' },
      { type: 'text', text: '5] And had they been patient until you yourself came out to them, it would be better for them; and Allah is Oft Forgiving, Most Merciful.' },
      { type: 'arabic', text: 'يٰۤاَيُّهَا الَّذِيْنَ اٰمَنُوْۤا اِنْ جَآءَكُمْ فَاسِقٌۢ بِنَبَاٍ فَتَبَيَّنُوْۤا اَنْ تُصِيْبُوْا قَوْمًاۢ بِجَهَالَةٍ فَتُصْبِحُوْا عَلٰی مَا فَعَلْتُمْ نٰدِمِيْنَ' },
      { type: 'text', text: '6] O People who Believe! If any miscreant brings you some tidings, verify it, lest you unknowingly cause suffering to some people, and then remain repenting for what you did.' },
      { type: 'arabic', text: 'وَ اعْلَمُوْۤا اَنَّ فِيْكُمْ رَسُوْلَ اللّٰهِ ؕ لَوْ يُطِيْعُكُمْ فِيْ كَثِيْرٍ مِّنَ الْاَمْرِ لَعَنِتُّمْ وَ لٰكِنَّ اللّٰهَ حَبَّبَ اِلَيْكُمُ الْاِيْمَانَ وَ زَيَّنَهٗ فِيْ قُلُوْبِكُمْ وَ كَرَّهَ اِلَيْكُمُ الْكُفْرَ وَ الْفُسُوْقَ وَ الْعِصْيَانَ ؕ اُولٰٓئِكَ هُمُ الرّٰشِدُوْنَۙ' },
      { type: 'text', text: '7] And know that Allah’s Noble Messenger is among you; in most of the affairs, were he to listen to you, you would surely fall into hardship, but Allah has made faith dear to you and has instilled it in your hearts, and has made disbelief and rebellion and disobedience abhorred by you; it is people like these who are on guidance.' },
      { type: 'arabic', text: 'فَضْلًا مِّنَ اللّٰهِ وَ نِعْمَةً ؕ وَ اللّٰهُ عَلِيْمٌ حَكِيْمٌ' },
      { type: 'text', text: '8] The munificence and favour of Allah; and Allah is All Knowing, Wise.' },
      { type: 'arabic', text: 'وَ اِنْ طَآئِفَتٰنِ مِنَ الْمُؤْمِنِيْنَ اقْتَتَلُوْا فَاَصْلِحُوْا بَيْنَهُمَا ۚ فَاِنْۢ بَغَتْ اِحْدٰىهُمَا عَلَى الْاُخْرٰى فَقَاتِلُوا الَّتِيْ تَبْغِيْ حَتّٰى تَفِيْٓءَ اِلٰۤى اَمْرِ اللّٰهِ ۚ فَاِنْ فَاءَتْ فَاَصْلِحُوْا بَيْنَهُمَا بِالْعَدْلِ وَ اَقْسِطُوْا ؕ اِنَّ اللّٰهَ يُحِبُّ الْمُقْسِطِيْنَ' },
      { type: 'text', text: '9] And if two groups of Muslims fight against each other, reconcile them; and if one of them oppresses the other, fight against the oppressor till it returns to the command of Allah; then if it returns, reconcile between them with justice, and be fair; indeed Allah loves the equitable.' },
      { type: 'arabic', text: 'اِنَّمَا الْمُؤْمِنُوْنَ اِخْوَةٌ فَاَصْلِحُوْا بَيْنَ اَخَوَيْكُمْ وَ اتَّقُوا اللّٰهَ لَعَلَّكُمْ تُرْحَمُوْنَ' },
      { type: 'text', text: '10] The Muslims are brothers to each other, therefore make peace between your two brothers and fear Allah, so that you may gain mercy. (The entire Muslim nation is a single brotherhood, without any distinction for caste, creed or colour.)' },
      { type: 'arabic', text: 'يٰۤاَيُّهَا الَّذِيْنَ اٰمَنُوْا لَا يَسْخَرْ قَوْمٌ مِّنْ قَوْمٍ عَسٰۤى اَنْ يَّكُوْنُوْا خَيْرًا مِّنْهُمْ وَ لَا نِسَآءٌ مِّنْ نِّسَآءٍ عَسٰۤى اَنْ يَّكُوْنَّ خَيْرًا مِّنْهُنَّ ۚ وَ لَا تَلْمِزُوْۤا اَنْفُسَكُمْ وَ لَا تَنَابَزُوْا بِالْاَلْقَابِ ؕ بِئْسَ الِاسْمُ الْفُسُوْقُ بَعْدَ الْاِيْمَانِ ۚ وَ مَنْ لَّمْ يَتُبْ فَاُولٰٓئِكَ هُمُ الظّٰلِمُوْنَ' },
      { type: 'text', text: '11] O People who Believe! Men must not ridicule other men for it could be that the ridiculed are better than the mockers, nor must the women ridicule other women for the ridiculed women may be better than the mockers; and do not insult one another, nor assign evil nicknames; how base it is to be called a sinner after being a Muslim! And whoever does not repent - then it is they who are unjust.' },
      { type: 'arabic', text: 'يٰۤاَيُّهَا الَّذِيْنَ اٰمَنُوا اجْتَنِبُوْا كَثِيْرًا مِّنَ الظَّنِّ ۫ اِنَّ بَعْضَ الظَّنِّ اِثْمٌ وَّ لَا تَجَسَّسُوْا وَ لَا يَغْتَبْ بَّعْضُكُمْ بَعْضًا ؕ اَيُحِبُّ اَحَدُكُمْ اَنْ يَّاكُلَ لَحْمَ اَخِيْهِ مَيْتًا فَكَرِهْتُمُوْهُ ؕ وَ اتَّقُوا اللّٰهَ ؕ اِنَّ اللّٰهَ تَوَّابٌ رَّحِيْمٌ' },
      { type: 'text', text: '12] O People who Believe! Avoid excessive assumptions; indeed assumption sometimes becomes a sin, and do not seek faults, and do not slander one another; would any one among you like to eat the flesh of his dead brother? So you will hate that! And fear Allah; indeed Allah is Most Acceptor of Repentance, Most Merciful.' },
      { type: 'arabic', text: 'يٰۤاَيُّهَا النَّاسُ اِنَّا خَلَقْنٰكُمْ مِّنْ ذَكَرٍ وَّ اُنْثٰی وَ جَعَلْنٰكُمْ شُعُوْبًا وَّ قَبَآئِلَ لِتَعَارَفُوْا ؕ اِنَّ اَكْرَمَكُمْ عِنْدَ اللّٰهِ اَتْقٰىكُمْ ؕ اِنَّ اللّٰهَ عَلِيْمٌ خَبِيْرٌ' },
      { type: 'text', text: '13] O mankind! We have indeed created you from one man and one woman, and have made you into various nations and tribes so that you may know one another; indeed the more honourable among you, in the sight of Allah, is one who is more pious among you; indeed Allah is All Knowing, All Aware. (Piety is the basis of honour in Allah’s sight.)' },
      { type: 'arabic', text: 'قَالَتِ الْاَعْرَابُ اٰمَنَّا ؕ قُلْ لَّمْ تُؤْمِنُوْا وَ لٰكِنْ قُوْلُوْۤا اَسْلَمْنَا وَ لَمَّا يَدْخُلِ الْاِيْمَانُ فِيْ قُلُوْبِكُمْ ؕ وَ اِنْ تُطِيْعُوا اللّٰهَ وَ رَسُوْلَهٗ لَا يَلِتْكُمْ مِّنْ اَعْمَالِكُمْ شَيْئًا ؕ اِنَّ اللّٰهَ غَفُوْرٌ رَّحِيْمٌ' },
      { type: 'text', text: '14] The ignorant said, “We have accepted faith”; say, (O dear Prophet Mohammed - peace and blessings be upon him), “You have surely not accepted faith, but you should say ‘We have submitted’, for faith has not yet entered your hearts; and if you obey * Allah and His Noble Messenger, He will not reduce the reward of any of your deeds; indeed Allah is Oft Forgiving, Most Merciful.” (* By accepting faith and then obeying the commands).' },
      { type: 'arabic', text: 'اِنَّمَا الْمُؤْمِنُوْنَ الَّذِيْنَ اٰمَنُوْا بِاللّٰهِ وَ رَسُوْلِهٖ ثُمَّ لَمْ يَرْتَابُوْا وَ جَاهَدُوْا بِاَمْوَالِهِمْ وَ اَنْفُسِهِمْ فِيْ سَبِيْلِ اللّٰهِ ؕ اُولٰٓئِكَ هُمُ الصّٰدِقُوْنَ' },
      { type: 'text', text: '15] The true believers are only those who accepted faith in Allah and His Noble Messenger and then did not have any doubt, and fought with their wealth and their lives in Allah’s way; it is they who are the truthful.' },
      { type: 'arabic', text: 'قُلْ اَتُعَلِّمُوْنَ اللّٰهَ بِدِيْنِكُمْ ؕ وَ اللّٰهُ يَعْلَمُ مَا فِي السَّمٰوٰتِ وَ مَا فِي الْاَرْضِ ؕ وَ اللّٰهُ بِكُلِّ شَيْءٍ عَلِيْمٌ' },
      { type: 'text', text: '16] Proclaim (O dear Prophet Mohammed - peace and blessings be upon him), “Are you teaching Allah your own religion? Whereas Allah knows all whatever is in the heavens and all whatever is in the earth; and Allah knows all things.”' },
      { type: 'arabic', text: 'يَمُنُّوْنَ عَلَيْكَ اَنْ اَسْلَمُوْا ؕ قُلْ لَّا تَمُنُّوْا عَلَيَّ اِسْلَامَكُمْ ۚ بَلِ اللّٰهُ يَمُنُّ عَلَيْكُمْ اَنْ هَدٰىكُمْ لِلْاِيْمَانِ اِنْ كُنْتُمْ صٰدِقِيْنَ' },
      { type: 'text', text: '17] They portray that they are doing a great favour to you (O dear Prophet Mohammed - peace and blessings be upon him) by having become Muslims; say, “Do not think that you have done me a favour by accepting Islam; in fact Allah has bestowed a favour upon you, for He guided you to Islam, if you are truthful.”' },
      { type: 'arabic', text: 'اِنَّ اللّٰهَ يَعْلَمُ غَيْبَ السَّمٰوٰتِ وَ الْاَرْضِ ؕ وَ اللّٰهُ بَصِيْرٌۢ بِمَا تَعْمَلُوْنَ' },
      { type: 'text', text: '18] Indeed Allah knows all the hidden of the heavens and the earth; and Allah is seeing your deeds.' }
