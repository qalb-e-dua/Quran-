      { type: 'arabic', text: 'قَدْ عَلِمْنَا مَا تَنْقُصُ الْاَرْضُ مِنْهُمْ ۚ وَ عِنْدَنَا كِتٰبٌ حَفِيْظٌ' },
      { type: 'text', text: '4] We know all what the earth decreases from them; and with Us is a Book that retains.' },
      { type: 'arabic', text: 'بَلْ كَذَّبُوْا بِالْحَقِّ لَمَّا جَآءَهُمْ فَهُمْ فِيْۤ اَمْرٍ مَّرِيْجٍ' },
      { type: 'text', text: '5] In fact they denied the Truth when it came to them, so they are now in a dilemma.' },
      { type: 'arabic', text: 'اَفَلَمْ يَنْظُرُوْۤا اِلَى السَّمَآءِ فَوْقَهُمْ كَيْفَ بَنَيْنٰهَا وَ زَيَّنّٰهَا وَ مَا لَهَا مِنْ فُرُوْجٍ' },
      { type: 'text', text: '6] So did they not see the sky above them - how We have made it and beautified it, and there are no cracks in it?' },
      { type: 'arabic', text: 'وَ الْاَرْضَ مَدَدْنٰهَا وَ اَلْقَيْنَا فِيْهَا رَوَاسِيَ وَ اَنْۢبَتْنَا فِيْهَا مِنْ كُلِّ زَوْجٍۢ بَهِيْجٍۙ' },
      { type: 'text', text: '7] And (how) We have spread the earth, and placed mountains as anchors in it, and have grown all kinds of beautiful pairs in it?' },
      { type: 'arabic', text: 'تَبْصِرَةً وَّ ذِكْرٰی لِكُلِّ عَبْدٍ مُّنِيْبٍ' },
      { type: 'text', text: '8] A perception and an understanding, for every bondman who inclines.' },
      { type: 'arabic', text: 'وَ نَزَّلْنَا مِنَ السَّمَآءِ مَآءً مُّبٰرَكًا فَاَنْۢبَتْنَا بِهٖ جَنّٰتٍ وَّ حَبَّ الْحَصِيْدِۙ' },
      { type: 'text', text: '9] And We sent down the auspicious water from the sky, therefore producing gardens with it, and the grain that is harvested.' },
      { type: 'arabic', text: 'وَ النَّخْلَ بَاسِقٰتٍ لَّهَا طَلْعٌ نَّضِيْدٌۙ' },
      { type: 'text', text: '10] And high date-palms with lush fruit.' },
      { type: 'arabic', text: 'رِّزْقًا لِّلْعِبَادِ ۙ وَ اَحْيَيْنَا بِهٖ بَلْدَةً مَّيْتًا ؕ كَذٰلِكَ الْخُرُوْجُ' },
      { type: 'text', text: '11] As sustenance for the bondmen; and with it We revived a dead city; this is how you will be raised.' },
      { type: 'arabic', text: 'كَذَّبَتْ قَبْلَهُمْ قَوْمُ نُوْحٍ وَّ اَصْحٰبُ الرَّسِّ وَ ثَمُوْدُۙ' },
      { type: 'text', text: '12] Before these, the people of Nooh had denied, and so did the dwellers of Rass and the Thamud.' },
      { type: 'arabic', text: 'وَ عَادٌ وَّ فِرْعَوْنُ وَ اِخْوَانُ لُوْطٍۙ' },
      { type: 'text', text: '13] And the tribe of A’ad, and Firaun, and the fellowmen of Lut.' },
      { type: 'arabic', text: 'وَّ اَصْحٰبُ الْاَيْكَةِ وَ قَوْمُ تُبَّعٍ ؕ كُلٌّ كَذَّبَ الرُّسُلَ فَحَقَّ وَعِيْدِ' },
      { type: 'text', text: '14] And the Dwellers of the Woods, and the people of Tubb’a; each one of them one denied the Noble Messengers, so My promised punishment proved true.' },
      { type: 'arabic', text: 'اَفَعَيِيْنَا بِالْخَلْقِ الْاَوَّلِ ؕ بَلْ هُمْ فِيْ لَبْسٍ مِّنْ خَلْقٍ جَدِيْدٍ' },
      { type: 'text', text: '15] So did We tire by creating the first time? Rather they doubt in being created again.' },
      { type: 'arabic', text: 'وَ لَقَدْ خَلَقْنَا الْاِنْسَانَ وَ نَعْلَمُ مَا تُوَسْوِسُ بِهٖ نَفْسُهٗ ۚۖ وَ نَحْنُ اَقْرَبُ اِلَيْهِ مِنْ حَبْلِ الْوَرِيْدِ' },
      { type: 'text', text: '16] And indeed We have created man and We know what his soul instils in him; and We are nearer to him than the heart’s artery.' },
      { type: 'arabic', text: 'اِذْ يَتَلَقَّى الْمُتَلَقِّيٰنِ عَنِ الْيَمِيْنِ وَ عَنِ الشِّمَالِ قَعِيْدٌ' },
      { type: 'text', text: '17] When the two receiving angels receive from him, one seated on the right and one on the left.' },
      { type: 'arabic', text: 'مَا يَلْفِظُ مِنْ قَوْلٍ اِلَّا لَدَيْهِ رَقِيْبٌ عَتِيْدٌ' },
      { type: 'text', text: '18] He does not utter a single word, without a ready recorder seated next to him.' },
      { type: 'arabic', text: 'وَ جَآءَتْ سَكْرَةُ الْمَوْتِ بِالْحَقِّ ؕ ذٰلِكَ مَا كُنْتَ مِنْهُ تَحِيْدُ' },
      { type: 'text', text: '19] And the hardship of death came with the truth; “This is what you were escaping from!”' },
      { type: 'arabic', text: 'وَ نُفِخَ فِي الصُّوْرِ ؕ ذٰلِكَ يَوْمُ الْوَعِيْدِ' },
      { type: 'text', text: '20] And the Trumpet was blown; “This is the Day of the promised punishment.”' },
      { type: 'arabic', text: 'وَ جَآءَتْ كُلُّ نَفْسٍ مَّعَهَا سَآئِقٌ وَّ شَهِيْدٌ' },
      { type: 'text', text: '21] And every soul came, along with a herder and a witness.' },
      { type: 'arabic', text: 'لَقَدْ كُنْتَ فِيْ غَفْلَةٍ مِّنْ هٰذَا فَكَشَفْنَا عَنْكَ غِطَآءَكَ فَبَصَرُكَ الْيَوْمَ حَدِيْدٌ' },
      { type: 'text', text: '22] “You were indeed neglectful of this, so We have removed the veil for you, and your eyesight is sharp this day.”' },
      { type: 'arabic', text: 'وَ قَالَ قَرِيْنُهٗ هٰذَا مَا لَدَيَّ عَتِيْدٌؕ' },
      { type: 'text', text: '23] And his accompanying angel said, “This is the record of your deeds, available with me.”' },
      { type: 'arabic', text: 'اَلْقِيَا فِيْ جَهَنَّمَ كُلَّ كَفَّارٍ عَنِيْدٍۙ' },
      { type: 'text', text: '24] It will be said to the angels, “Both of you fling every excessive ungrateful, stubborn person into hell.”' },
      { type: 'arabic', text: 'مَّنَّاعٍ لِّلْخَيْرِ مُعْتَدٍ مُّرِيْبٍۙ' },
      { type: 'text', text: '25] “The one who excessively prevented from virtue, the transgressor, the doubtful.”' },
      { type: 'arabic', text: 'الَّذِيْ جَعَلَ مَعَ اللّٰهِ اِلٰهًا اٰخَرَ فَاَلْقِيٰهُ فِي الْعَذَابِ الشَّدِيْدِ' },
      { type: 'text', text: '26] “The one who appointed another God along with Allah – so both of you fling him into the severe punishment.”' },
      { type: 'arabic', text: 'قَالَ قَرِيْنُهٗ رَبَّنَا مَاۤ اَطْغَيْتُهٗ وَ لٰكِنْ كَانَ فِيْ ضَلٰلٍۢ بَعِيْدٍ' },
      { type: 'text', text: '27] His accompanying devil said, “Our Lord! I did not cause him to rebel, but he himself was in extreme error.”' },
      { type: 'arabic', text: 'قَالَ لَا تَخْتَصِمُوْا لَدَيَّ وَ قَدْ قَدَّمْتُ اِلَيْكُمْ بِالْوَعِيْدِ' },
      { type: 'text', text: '28] He will say, “Do not dispute before Me – I had already warned you of the punishment.”' },
      { type: 'arabic', text: 'مَا يُبَدَّلُ الْقَوْلُ لَدَيَّ وَ مَاۤ اَنَا بِظَلَّامٍ لِّلْعَبِيْدِ' },
      { type: 'text', text: '29] “With Me, the decree does not change, and nor do I oppress the bondmen.”' },
      { type: 'arabic', text: 'يَوْمَ نَقُوْلُ لِجَهَنَّمَ هَلِ امْتَلَاْتِ وَ تَقُوْلُ هَلْ مِنْ مَّزِيْدٍ' },
      { type: 'text', text: '30] The day when We will ask hell, “Are you filled up?” and it will answer, “Are there some more?”' },
      { type: 'arabic', text: 'وَ اُزْلِفَتِ الْجَنَّةُ لِلْمُتَّقِيْنَ غَيْرَ بَعِيْدٍ' },
      { type: 'text', text: '31] And Paradise will be brought close to the pious, not far away from them.' },
      { type: 'arabic', text: 'هٰذَا مَا تُوْعَدُوْنَ لِكُلِّ اَوَّابٍ حَفِيْظٍۚ' },
      { type: 'text', text: '32] This is what you are promised – for every repenting, careful person.' },
      { type: 'arabic', text: 'مَنْ خَشِيَ الرَّحْمٰنَ بِالْغَيْبِ وَ جَآءَ بِقَلْبٍ مُّنِيْبِۙ' },
      { type: 'text', text: '33] Who fears the Most Gracious without seeing, and came with a heart that inclines.' },
      { type: 'arabic', text: 'ادْخُلُوْهَا بِسَلٰمٍ ؕ ذٰلِكَ يَوْمُ الْخُلُوْدِ' },
      { type: 'text', text: '34] It will be said to him, “Enter it in peace; this is the day of eternity.”' },
      { type: 'arabic', text: 'لَهُمْ مَّا يَشَآءُوْنَ فِيْهَا وَ لَدَيْنَا مَزِيْدٌ' },
      { type: 'text', text: '35] In it for them is all that they may desire, and with Us is more than it.' },
      { type: 'arabic', text: 'وَ كَمْ اَهْلَكْنَا قَبْلَهُمْ مِّنْ قَرْنٍ هُمْ اَشَدُّ مِنْهُمْ بَطْشًا فَنَقَّبُوْا فِي الْبِلَادِ ؕ هَلْ مِنْ مَّحِيْصٍ' },
      { type: 'text', text: '36] And many a generation We did destroy before them, who exceeded them in strength, therefore venturing in the cities! Is there a place to escape?' },
      { type: 'arabic', text: 'اِنَّ فِيْ ذٰلِكَ لَذِكْرٰی لِمَنْ كَانَ لَهٗ قَلْبٌ اَوْ اَلْقَی السَّمْعَ وَ هُوَ شَهِيْدٌ' },
      { type: 'text', text: '37] Indeed in this is an advice for anyone who keeps a heart, or listens attentively.' },
      { type: 'arabic', text: 'وَ لَقَدْ خَلَقْنَا السَّمٰوٰتِ وَ الْاَرْضَ وَ مَا بَيْنَهُمَا فِيْ سِتَّةِ اَيَّامٍ ۚۖ وَّ مَا مَسَّنَا مِنْ لُّغُوْبٍ' },
      { type: 'text', text: '38] And We have indeed created the heavens and the earth, and all what is between them, in six days; and fatigue did not even approach Us.' },
      { type: 'arabic', text: 'فَاصْبِرْ عَلٰی مَا يَقُوْلُوْنَ وَ سَبِّحْ بِحَمْدِ رَبِّكَ قَبْلَ طُلُوْعِ الشَّمْسِ وَ قَبْلَ الْغُرُوْبِۚ' },
      { type: 'text', text: '39] Therefore (O dear prophet Mohammed – peace and blessings be upon him) patiently bear upon what they say, and praising your Lord say His Purity before the sun rises and before the sun sets.' },
      { type: 'arabic', text: 'وَ مِنَ الَّيْلِ فَسَبِّحْهُ وَ اَدْبَارَ السُّجُوْدِ' },
      { type: 'text', text: '40] And say His Purity during the night, and after the customary prayers.' },
      { type: 'arabic', text: 'وَ اسْتَمِعْ يَوْمَ يُنَادِ الْمُنَادِ مِنْ مَّكَانٍ قَرِيْبٍۙ' },
      { type: 'text', text: '41] And listen attentively on the day when an announcer will proclaim from a place nearby.' },
      { type: 'arabic', text: 'يَوْمَ يَسْمَعُوْنَ الصَّيْحَةَ بِالْحَقِّ ؕ ذٰلِكَ يَوْمُ الْخُرُوْجِ' },
      { type: 'text', text: '42] The day when all will hear the Scream with the truth; this is the day of coming out of the graves.' },
      { type: 'arabic', text: 'اِنَّا نَحْنُ نُحْيٖ وَ نُمِيْتُ وَ اِلَيْنَا الْمَصِيْرُۙ' },
      { type: 'text', text: '43] Indeed it is We Who give life, and give death, and towards Us only is the return.' },
      { type: 'arabic', text: 'يَوْمَ تَشَقَّقُ الْاَرْضُ عَنْهُمْ سِرَاعًا ؕ ذٰلِكَ حَشْرٌ عَلَيْنَا يَسِيْرٌ' },
      { type: 'text', text: '44] On the day when the earth will split for them, so they will come out in haste; this is the gathering - easy for Us.' },
      { type: 'arabic', text: 'نَحْنُ اَعْلَمُ بِمَا يَقُوْلُوْنَ وَ مَاۤ اَنْتَ عَلَيْهِمْ بَجَبَّارٍ ۪ فَذَكِّرْ بِالْقُرْاٰنِ مَنْ يَّخَافُ وَعِيْدِ' },
   { type: 'text', text: '45] We well know what they say (O dear Prophet Mohammed – peace and blessings be upon him), and you are not one to use force over them; therefore advise him with the Qur’an, whoever fears My threat.' }
            ]
        },

        {
            id: 51, name: "AD DHARIYAT", ar: "الذاريات", juz: 26,
            audio: 'https://server10.mp3quran.net/minsh/051.mp3',
            content: [
                { type: 'section-title', text: 'AD DHARIYAT (THE SCATTERING WINDS)' },
                { type: 'text', text: '(Revealed at Mecca - 60 verses)' },
                { type: 'arabic', text: 'بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ' },
                { type: 'text', text: 'Allah - beginning with the name of - the Most Gracious, the Most Merciful' },
      { type: 'arabic', text: 'وَ الذّٰرِيٰتِ ذَرْوًاۙ' },
      { type: 'text', text: '1] By oath of those that blow with a dispersion.' },
      { type: 'arabic', text: 'فَالْحٰمِلٰتِ وِقْرًاۙ' },
      { type: 'text', text: '2] Then those that carry a heavy burden.' },
      { type: 'arabic', text: 'فَالْجٰرِيٰتِ يُسْرًاۙ' },
      { type: 'text', text: '3] Then those that glide with ease.' },
      { type: 'arabic', text: 'فَالْمُقَسِّمٰتِ اَمْرًاۙ' },
      { type: 'text', text: '4] Then those that distribute the command.' },
      { type: 'arabic', text: 'اِنَّمَا تُوْعَدُوْنَ لَصَادِقٌۙ' },
      { type: 'text', text: '5] Indeed what you are promised is true.' },
      { type: 'arabic', text: 'وَّ اِنَّ الدِّيْنَ لَوَاقِعٌؕ' },
      { type: 'text', text: '6] And indeed the judgment will surely happen.' },
      { type: 'arabic', text: 'وَ السَّمَآءِ ذَاتِ الْحُبُكِۙ' },
      { type: 'text', text: '7] By oath of the sky, the owner of paths.' },
      { type: 'arabic', text: 'اِنَّكُمْ لَفِيْ قَوْلٍ مُّخْتَلِفٍۙ' },
      { type: 'text', text: '8] Indeed you are in a discordant opinion.' },
      { type: 'arabic', text: 'يُّؤْفَكُ عَنْهُ مَنْ اُفِكَؕ' },
      { type: 'text', text: '9] Diverted from it is he who is diverted.' },
      { type: 'arabic', text: 'قُتِلَ الْخَرّٰصُوْنَۙ' },
      { type: 'text', text: '10] Accursed be the liars.' },
      { type: 'arabic', text: 'الَّذِيْنَ هُمْ فِيْ غَمْرَةٍ سَاهُوْنَۚ' },
      { type: 'text', text: '11] Those who are in a confused state, neglectful.' },
      { type: 'arabic', text: 'يَسْـَٔلُوْنَ اَيَّانَ يَوْمُ الدِّيْنِؕ' },
      { type: 'text', text: '12] They ask, “When will the Day of Judgment be?”' },
      { type: 'arabic', text: 'يَوْمَ هُمْ عَلَى النَّارِ يُفْتَنُوْنَ' },
      { type: 'text', text: '13] (It is) the day when they will be punished upon the fire.' },
      { type: 'arabic', text: 'ذُوْقُوْا فِتْنَتَكُمْ ؕ هٰذَا الَّذِيْ كُنْتُمْ بِهٖ تَسْتَعْجِلُوْنَ' },
      { type: 'text', text: '14] “Taste your punishment! This is what you were being impatient for.”' },
      { type: 'arabic', text: 'اِنَّ الْمُتَّقِيْنَ فِيْ جَنّٰتٍ وَّ عُيُوْنٍۙ' },
      { type: 'text', text: '15] Indeed the pious are in Gardens and water-springs.' },
      { type: 'arabic', text: 'اٰخِذِيْنَ مَاۤ اٰتٰىهُمْ رَبُّهُمْ ؕ اِنَّهُمْ كَانُوْا قَبْلَ ذٰلِكَ مُحْسِنِيْنَؕ' },
      { type: 'text', text: '16] Receiving what their Lord has given them; indeed they were virtuous before this.' },
      { type: 'arabic', text: 'كَانُوْا قَلِيْلًا مِّنَ الَّيْلِ مَا يَهْجَعُوْنَ' },
      { type: 'text', text: '17] They used to sleep but little during the night.' },
      { type: 'arabic', text: 'وَ بِالْاَسْحَارِ هُمْ يَسْتَغْفِرُوْنَ' },
      { type: 'text', text: '18] And in the latter parts of the night they used to seek forgiveness.' },
      { type: 'arabic', text: 'وَ فِيْۤ اَمْوَالِهِمْ حَقٌّ لِّلسَّآئِلِ وَ الْمَحْرُوْمِ' },
      { type: 'text', text: '19] And in their wealth was a share for the beggar and the prevented.' },
      { type: 'arabic', text: 'وَ فِي الْاَرْضِ اٰيٰتٌ لِّلْمُوْقِنِيْنَۙ' },
      { type: 'text', text: '20] And in the earth are signs for those who are certain.' },
      { type: 'arabic', text: 'وَ فِيْۤ اَنْفُسِكُمْ ؕ اَفَلَا تُبْصِرُوْنَ' },
      { type: 'text', text: '21] And within yourselves; so do you not see?' },
      { type: 'arabic', text: 'وَ فِي السَّمَآءِ رِزْقُكُمْ وَ مَا تُوْعَدُوْنَ' },
      { type: 'text', text: '22] And in the sky is your sustenance and what you are promised.' },
      { type: 'arabic', text: 'فَوَرَبِّ السَّمَآءِ وَ الْاَرْضِ اِنَّهٗ لَحَقٌّ مِّثْلَ مَاۤ اَنَّكُمْ تَنْطِقُوْنَ' },
      { type: 'text', text: '23] So by the oath of the Lord of the heavens and the earth, this (Last Day) is a reality, just as you speak!' },
      { type: 'arabic', text: 'هَلْ اَتٰىكَ حَدِيْثُ ضَيْفِ اِبْرٰهِيْمَ الْمُكْرَمِيْنَۘ' },
      { type: 'text', text: '24] Has the news of the honoured guests of Ibrahim come to you?' },
      { type: 'arabic', text: 'اِذْ دَخَلُوْا عَلَيْهِ فَقَالُوْا سَلٰمًا ؕ قَالَ سَلٰمٌ ۚ قَوْمٌ مُّنْكَرُوْنَۚ' },
      { type: 'text', text: '25] When they came to him and said, “Peace!”; he said, “Peace! (You are) a group of strangers.”' },
      { type: 'arabic', text: 'فَرَاغَ اِلٰۤى اَهْلِهٖ فَجَآءَ بِعِجْلٍ سَمِيْنٍۙ' },
      { type: 'text', text: '26] Then he went to his family and brought a fat calf.' },
      { type: 'arabic', text: 'فَقَرَّبَهٗۤ اِلَيْهِمْ قَال اَلَا تَاْكُلُوْنَ' },
      { type: 'text', text: '27] So he placed it before them; he said, “Do you not eat?”' },
      { type: 'arabic', text: 'فَاَوْجَسَ مِنْهُمْ خِيْفَةً ؕ قَالُوْا لَا تَخَافُ ؕ وَ بَشَّرُوْهُ بِغُلٰمٍ عَلِيْمٍ' },
      { type: 'text', text: '28] So he became slightly afraid of them in his heart; they said, “Do not fear!”; and they gave him the glad tidings of a son possessing knowledge.' },
      { type: 'arabic', text: 'فَاَقْبَلَتِ امْرَاَتُهٗ فِيْ صَرَّةٍ فَصَكَّتْ وَجْهَهَا وَ قَالَتْ عَجُوْزٌ عَقِيْمٌ' },
      { type: 'text', text: '29] His wife came out shouting, and struck her forehead and said, “What! A barren old woman?”' },
      { type: 'arabic', text: 'قَالُوْا كَذٰلِكِ ۙ قَالَ رَبُّكِ ؕ اِنَّهٗ هُوَ الْحَكِيْمُ الْعَلِيْمُ' },
      { type: 'text', text: '30] They said, “Thus has your Lord said; indeed He is the Wise, the All Knowing.”' },
      { type: 'arabic', text: 'قَالَ فَمَا خَطْبُكُمْ اَيُّهَا الْمُرْسَلُوْنَ' },
      { type: 'text', text: '31] Said Ibrahim, “What is your important mission, O messengers?”' },
      { type: 'arabic', text: 'قَالُوْۤا اِنَّاۤ اُرْسِلْنَاۤ اِلٰی قَوْمٍ مُّجْرِمِيْنَۙ' },

      { type: 'arabic', text: 'لِنُرْسِلَ عَلَيْهِمْ حِجَارَةً مِّنْ طِيْنٍۙ' },

      { type: 'arabic', text: 'مُّسَوَّمَةً عِنْدَ رَبِّكَ لِلْمُسْرِفِيْنَ' },
      { type: 'text', text: '34] “Which are marked from your Lord, for the transgressors.”' },
      { type: 'arabic', text: 'فَاَخْرَجْنَا مَنْ كَانَ فِيْهَا مِنَ الْمُؤْمِنِيْنَۚ' },
      { type: 'text', text: '35] So We removed all the believers who were there.' },
      { type: 'arabic', text: 'فَمَا وَجَدْنَا فِيْهَا غَيْرَ بَيْتٍ مِّنَ الْمُسْلِمِيْنَۚ' },

      { type: 'text', text: '39] So he turned away with his power and said, “A magician or a madman!”' },
      { type: 'arabic', text: 'فَاَخَذْنٰهُ وَ جُنُوْدَهٗ فَنَبَذْنٰهُمْ فِي الْيَمِّ وَ هُوَ مُلِيْمٌؕ' },
      { type: 'text', text: '40] So We seized him and his armies and flung them into the sea, and he was the one to be blamed.' },
      { type: 'arabic', text: 'وَ فِيْ عَادٍ اِذْ اَرْسَلْنَا عَلَيْهِمُ الرِّيْحَ الْعَقِيْمَۚ' },
      { type: 'text', text: '41] And in the A’ad, when We sent upon them the windstorm that ruins.' },

      { type: 'text', text: '46] And We destroyed the people of Nooh before this; they were indeed a disobedient nation.' },
      { type: 'arabic', text: 'وَ السَّمَآءَ بَنَيْنٰهَا بِاَيْىْدٍ وَّ اِنَّا لَمُوْسِعُوْنَ' },

      { type: 'text', text: '49] And We have created all things in pairs, so that you may understand.' },

      { type: 'text', text: '52] Similarly, whenever a Noble Messenger came to those before them, they only said, “A magician or a madman!”' },

      { type: 'text', text: '58] Indeed Allah only is the Greatest Sustainer, the Powerful, the Strong.' },

      { type: 'text', text: '59] So for the unjust is a share (of punishment) like the share of their companions, so they should not be impatient.' },
      { type: 'arabic', text: 'فَوَيْلٌ لِّلَّذِيْنَ كَفَرُوْا مِنْ يَّوْمِهِمُ الَّذِيْ يُوْعَدُوْنَ' },

            ]

    // <-- FIX 4: Removed the random { that was breaking your variables
   let activeID = 42;
    let fontSize = 30; // Better starting size
    let currentMode = 'vbv';

    function init() {
        const target = document.getElementById('sidebar-target');
        surahs.forEach(s => {
            const div = document.createElement('div');
            div.className = 'surah-item';
            div.innerHTML = `<b>${s.id}</b> <span style="flex:1; margin-left:15px">${s.name}</span> <span style="font-family:'Scheherazade New', serif; font-size: 20px;">${s.ar}</span>`;
            div.onclick = () => { activeID = s.id; loadSurah(s.id); toggleMenu(); };
            target.appendChild(div);
        });
        loadSurah(42);
    }

    function loadSurah(id) {
        const s = surahs.find(x => x.id === id);
        document.getElementById('qAudio').src = s.audio;
        document.getElementById('pill-name').innerText = s.name;
        document.getElementById('pill-juz').innerText = "JUZ " + s.juz;
        renderQuran();
    }

    function renderQuran() {
        const s = surahs.find(x => x.id === activeID);
        const target = document.getElementById('quran-render');
        const showTr = document.getElementById('trCheck').checked;
        let html = '';
        let ayahCounter = 1;

        // Professional Header
        html += `<div class="header-section">
                    <div class="surah-header-calligraphy">سورة ${s.ar}</div>
                    <div class="surah-en-title">${s.name}</div>
                    <div class="surah-meta">Revealed at Mecca</div>
                    <div class="bismillah">بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
                 </div>`;

        if (currentMode === 'vbv') {
            s.content.forEach((item, index) => {
                if (item.type === 'arabic') {
                    let trText = (s.content[index + 1] && s.content[index + 1].type === 'text') ? s.content[index + 1].text : '';
                    trText = trText.replace(/^\d+\]\s*/, ''); 
                    html += `<div class="verse-block" id="ayah-${ayahCounter}">
                        <div class="ar-text" style="font-size:${fontSize}px">${item.text} <span class="ayah-num">${ayahCounter}</span></div>
                        ${showTr ? `<div class="en-text">${trText}</div>` : ''}
                    </div>`;
                    ayahCounter++;
                }
            });
        } else {
            html += `<div class="inline-container">`;
            s.content.forEach((item, index) => {
                if (item.type === 'arabic') {
                    let trText = (s.content[index + 1] && s.content[index + 1].type === 'text') ? s.content[index + 1].text : '';
                    trText = trText.replace(/^\d+\]\s*/, ''); 
                    html += `<div class="inline-word-wrap" id="ayah-${ayahCounter}">
                        <span class="inline-ar" style="font-size:${fontSize}px">${item.text}</span>
                        ${showTr ? `<span class="inline-tr">${trText}</span>` : ''}
                    </div>`;
                    ayahCounter++;
                }
            });
            html += `</div>`;
        }
        target.innerHTML = html;
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('mode-vbv').classList.toggle('active', m === 'vbv');
        document.getElementById('mode-inline').classList.toggle('active', m === 'inline');
        renderQuran();
    }

    function changeSize(n) { fontSize += n; document.getElementById('szVal').innerText = fontSize+'pt'; renderQuran(); }
    function toggleMenu() { document.body.classList.toggle('sidebar-hidden'); }
    function openSettings() { document.getElementById('setModal').style.display = 'flex'; }
    function closeSettings() { document.getElementById('setModal').style.display = 'none'; }
    function toggleAudio() { 
        const a = document.getElementById('qAudio'); 
        if(a.paused) { a.play(); document.getElementById('playBtn').innerText = "⏸"; }
        else { a.pause(); document.getElementById('playBtn').innerText = "▶"; }
    }
    function jumpTo() {
        const val = document.getElementById('jumpInp').value;
        const el = document.getElementById(`ayah-${val}`);
        if(el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    init();
</script>
